name: Android Cross Compile

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  android-aarch64:
    name: Build aarch64-linux-android
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        # actions/checkout@v4 resolved 2026-06-26
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain@stable resolved 2026-06-26
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: aarch64-linux-android

      - name: Install Android NDK
        # nttld/setup-ndk@v1 resolved 2026-07-09
        uses: nttld/setup-ndk@1b1581dec54d118a36802c007e3f38dff507d74b
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Cross compile
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: ./scripts/cross_compile.sh

      - name: Upload binary artifact
        # actions/upload-artifact@v4 resolved 2026-07-02
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: termux-mcp-server-aarch64-linux-android
          path: target/aarch64-linux-android/release/termux-mcp-server
