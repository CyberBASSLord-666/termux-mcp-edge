name: Android Cross Compile

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/cross_compile.sh"
      - ".github/workflows/android-cross-compile.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  android-aarch64:
    name: Build aarch64-linux-android
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout
        # actions/checkout@v4 resolved 2026-06-26
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain@stable resolved 2026-06-26
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          targets: aarch64-linux-android

      - name: Install Android NDK
        # nttld/setup-ndk@1.6.0 resolved 2026-07-10
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Cross compile
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_ROOT }}
        run: ./scripts/cross_compile.sh

      - name: Upload binary artifact
        # actions/upload-artifact@v7.0.1 resolved 2026-07-10
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: termux-mcp-server-aarch64-linux-android
          path: target/aarch64-linux-android/release/termux-mcp-server
          if-no-files-found: error
          retention-days: 3
