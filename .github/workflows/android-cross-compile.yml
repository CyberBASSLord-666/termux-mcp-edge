name: Android Cross Compile

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "scripts/cross_compile.sh"
      - "scripts/package_android_artifact.sh"
      - "scripts/termux_release_validate.sh"
      - ".github/workflows/android-cross-compile.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  android-aarch64:
    name: Build aarch64-linux-android (${{ matrix.posture }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - posture: default
            features: ""
            artifact: termux-mcp-server-aarch64-linux-android-default
          - posture: mcp-runtime
            features: mcp-runtime
            artifact: termux-mcp-server-aarch64-linux-android-mcp-runtime
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0 resolved 2026-07-10
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false

      - name: Install pinned Rust toolchain
        # dtolnay/rust-toolchain@stable resolved 2026-06-26
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.88.0
          targets: aarch64-linux-android

      - name: Verify Rust toolchain and target
        run: |
          test "$(rustc --version | awk '{print $2}')" = "1.88.0"
          test "$(cargo --version | awk '{print $2}')" = "1.88.0"
          rustup target list --installed | grep -Fx aarch64-linux-android

      - name: Install Android NDK
        id: setup-ndk
        # nttld/setup-ndk@1.6.0 resolved 2026-07-10
        uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Cross compile
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          BUILD_FEATURES: ${{ matrix.features }}
        run: ./scripts/cross_compile.sh

      - name: Record exact artifact metadata
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
          BUILD_POSTURE: ${{ matrix.posture }}
          SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          version="$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[] | select(.name == "termux-mcp-server") | .version')"
          [[ -n "$version" && "$version" != null ]]
          bash scripts/package_android_artifact.sh \
            --binary target/aarch64-linux-android/release/termux-mcp-server \
            --output-dir target/aarch64-linux-android/release-candidate \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$SOURCE_SHA" \
            --workflow-run-id "$GITHUB_RUN_ID" \
            --artifact-name "$ARTIFACT_NAME" \
            --posture "$BUILD_POSTURE" \
            --version "$version"

      - name: Upload release-candidate bundle
        # actions/upload-artifact@v7.0.1 resolved 2026-07-10
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.artifact }}
          path: target/aarch64-linux-android/release-candidate/
          if-no-files-found: error
          retention-days: 3
