name: Apply directory replay remediation

on:
  push:
    branches:
      - create-directory-capability-grant-248
    paths:
      - .github/workflows/apply-directory-replay-remediation.yml

permissions:
  contents: write

concurrency:
  group: apply-directory-replay-remediation
  cancel-in-progress: false

jobs:
  apply:
    if: github.repository == 'CyberBASSLord-666/termux-mcp-edge'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out exact branch head
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: create-directory-capability-grant-248
          fetch-depth: 0
      - name: Apply staged remediation
        shell: bash
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "create-directory-capability-grant-248"
          python3 .github/remediation/apply_directory_replay_ledger.py
          rm -f .github/remediation/apply_directory_replay_ledger.py
          rm -f .github/replay-diagnostic.txt
          rm -f .github/workflows/apply-directory-replay-remediation.yml
          git diff --check
          git status --short
      - name: Commit compiled implementation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "Implement crash-durable directory grant replay ledger"
          git push origin HEAD:create-directory-capability-grant-248
