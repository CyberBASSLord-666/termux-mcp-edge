name: Replay Ledger Diagnostic

on:
  push:
    branches: [ create-directory-capability-grant-248 ]
    paths:
      - ".github/workflows/replay-ledger-diagnostic.yml"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: create-directory-capability-grant-248
          fetch-depth: 0
          persist-credentials: true
      - name: Capture exact guarded-applicator failure
        run: |
          set +e
          python3 .github/remediation/apply_directory_replay_ledger.py > /tmp/replay-diagnostic.log 2>&1
          status=$?
          {
            printf 'status=%s\n' "$status"
            tail -n 200 /tmp/replay-diagnostic.log
          } > .github/replay-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/replay-ledger-diagnostic.yml
          git add .github/replay-diagnostic.txt
          git commit -m "chore: capture replay ledger applicator diagnostic"
          git push origin HEAD:create-directory-capability-grant-248
