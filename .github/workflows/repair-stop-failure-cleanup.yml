name: Repair stop-failure candidate cleanup

on:
  push:
    branches:
      - atomic-service-transitions-203

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: atomic-service-transitions-203
          fetch-depth: 0

      - name: Apply focused fail-closed cleanup repair
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/termux_deploy.sh')
          text = path.read_text()
          old = '  stop_service_confirmed || fail "deployment aborted because canonical service shutdown was not confirmed"\n'
          new = '''  if ! stop_service_confirmed; then
            run rm -rf -- "$release_dir"
            TRANSACTION_ACTIVE=0
            fail "deployment aborted because canonical service shutdown was not confirmed"
          fi
          '''
          if text.count(old) != 1:
              raise SystemExit(f'expected exactly one deployment stop call, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          PY

      - name: Validate repair
        shell: bash
        run: |
          bash -n scripts/termux_deploy.sh
          bash tests/termux_deploy_test.sh

      - name: Remove temporary workflow and commit repair
        shell: bash
        run: |
          rm -f .github/workflows/repair-stop-failure-cleanup.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/termux_deploy.sh .github/workflows/repair-stop-failure-cleanup.yml
          git diff --cached --check
          git commit -m "fix: remove untouched candidate after stop failure"
          git push origin HEAD:atomic-service-transitions-203
