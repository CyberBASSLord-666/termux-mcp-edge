name: Security

on:
  push:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "build.rs"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - "scripts/cross_compile.sh"
      - "scripts/package_android_artifact.sh"
      - "scripts/termux_release_validate.sh"
      - "scripts/termux_device_smoke.sh"
      - "scripts/termux_deploy.sh"
      - "scripts/termux_emulated_gate.sh"
      - "scripts/termux_battery_emulated_gate.sh"
      - "scripts/termux_volume_emulated_gate.sh"
      - "scripts/termux_volume_control_emulated_gate.sh"
      - "scripts/termux_command_emulated_gate.sh"
      - "scripts/classify_observation_requirement.sh"
      - "scripts/verify_observation_inheritance.sh"
      - "docs/emulated-release-evidence-schema-v*.json"
      - "docs/release-evidence-schema-v*.json"
      - "docs/android-battery-emulated-evidence-schema-v*.json"
      - "docs/android-volume-emulated-evidence-schema-v*.json"
      - "docs/android-volume-control-emulated-evidence-schema-v*.json"
      - "docs/command-emulated-evidence-schema-v*.json"
      - "docs/release-observation-requirement-schema-v*.json"
      - "docs/release-observation-inheritance-schema-v*.json"
      - "docs/release-evidence/v0.5.1-physical-fe5f7b80.json"
      - ".github/actions/**"
      - ".github/workflows/*"
  pull_request:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "build.rs"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - "scripts/cross_compile.sh"
      - "scripts/package_android_artifact.sh"
      - "scripts/termux_release_validate.sh"
      - "scripts/termux_device_smoke.sh"
      - "scripts/termux_deploy.sh"
      - "scripts/termux_emulated_gate.sh"
      - "scripts/termux_battery_emulated_gate.sh"
      - "scripts/termux_volume_emulated_gate.sh"
      - "scripts/termux_volume_control_emulated_gate.sh"
      - "scripts/termux_command_emulated_gate.sh"
      - "scripts/classify_observation_requirement.sh"
      - "scripts/verify_observation_inheritance.sh"
      - "docs/emulated-release-evidence-schema-v*.json"
      - "docs/release-evidence-schema-v*.json"
      - "docs/android-battery-emulated-evidence-schema-v*.json"
      - "docs/android-volume-emulated-evidence-schema-v*.json"
      - "docs/android-volume-control-emulated-evidence-schema-v*.json"
      - "docs/command-emulated-evidence-schema-v*.json"
      - "docs/release-observation-requirement-schema-v*.json"
      - "docs/release-observation-inheritance-schema-v*.json"
      - "docs/release-evidence/v0.5.1-physical-fe5f7b80.json"
      - ".github/actions/**"
      - ".github/workflows/*"
  schedule:
    - cron: "17 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    name: Cargo audit
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0 resolved 2026-07-10
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Cache cargo-audit binary
        id: cargo-audit-cache
        uses: actions/cache@3edfce9056124e459a23f683a21433670d47daca
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-${{ runner.arch }}-rustsec-eee63cf3c3916a9b8305678dfb91206acd9e67eb-debug
      - name: Install cargo-audit
        if: steps.cargo-audit-cache.outputs.cache-hit != 'true'
        timeout-minutes: 8
        run: cargo install --quiet --debug --git https://github.com/RustSec/rustsec --rev eee63cf3c3916a9b8305678dfb91206acd9e67eb cargo-audit --locked
      - name: Prepare audit lockfile
        run: cargo fetch --locked
      - name: Audit dependencies
        run: |
          set +e
          cargo audit > cargo-audit.txt 2>&1
          status=$?
          cat cargo-audit.txt
          echo "$status" > cargo-audit.status
          exit 0
      - name: Upload cargo-audit output
        if: always()
        # actions/upload-artifact@v7.0.1 resolved 2026-07-10
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: cargo-audit-output
          path: |
            cargo-audit.txt
            cargo-audit.status
          if-no-files-found: error
          retention-days: 3
      - name: Fail on audit findings
        run: test "$(cat cargo-audit.status)" = "0"

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - rust
          - actions
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0 resolved 2026-07-10
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        # github/codeql-action@v4.37.2 resolved 2026-07-21
        uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          queries: security-extended
      - name: Analyze
        # github/codeql-action@v4.37.2 resolved 2026-07-21
        uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1
        with:
          category: "/language:${{ matrix.language }}"
