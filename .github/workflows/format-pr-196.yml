name: Format PR 196

on:
  push:
    branches:
      - normalize-transport-authorities-195

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: true
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: rustfmt
      - name: Apply canonical formatting and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          cargo fmt --all
          rm .github/workflows/format-pr-196.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m 'style: apply canonical rustfmt for PR 196'
          git push origin HEAD:normalize-transport-authorities-195
