name: Repair PR 216

# Branch-only one-shot repair; this workflow deletes itself after applying the patch.
on:
  push:
    branches:
      - atomic-service-transitions-203

permissions:
  contents: write

jobs:
  repair:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: true
          ref: atomic-service-transitions-203
      - name: Apply focused repair
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          script = Path('scripts/termux_deploy.sh')
          text = script.read_text()
          old = '''  run mv -- "$STAGING_DIR" "$release_dir"; STAGING_DIR=""; TRANSACTION_ACTIVE=1
  stop_service_confirmed || fail "deployment aborted because canonical service shutdown was not confirmed"
  prepare_service_stopped; activate_release "$release_dir"; start_service
'''
          new = '''  run mv -- "$STAGING_DIR" "$release_dir"; STAGING_DIR=""; TRANSACTION_ACTIVE=1
  if ! stop_service_confirmed; then
    run rm -rf -- "$release_dir"
    TRANSACTION_ACTIVE=0
    fail "deployment aborted because canonical service shutdown was not confirmed"
  fi
  prepare_service_stopped; activate_release "$release_dir"; start_service
'''
          if old not in text:
              raise SystemExit('expected deploy stop block not found')
          script.write_text(text.replace(old, new, 1))

          test = Path('tests/termux_deploy_test.sh')
          text = test.read_text()
          old = '''report_error() {
  local status=$? line="${BASH_LINENO[0]:-unknown}" command="${BASH_COMMAND:-unknown}"
  printf 'termux deployment test failed at line %s with status %s: %s\\n' "$line" "$status" "$command" >&2
  exit "$status"
}
trap report_error ERR
'''
          if old not in text:
              raise SystemExit('temporary diagnostic trap not found')
          test.write_text(text.replace(old, '', 1))
          PY
          rm -f .github/workflows/repair-pr-216.yml
          bash -n scripts/termux_deploy.sh
          bash tests/termux_deploy_test.sh
      - name: Commit repaired branch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/termux_deploy.sh tests/termux_deploy_test.sh .github/workflows/repair-pr-216.yml
          git commit -m "fix: clean untouched candidate after stop failure"
          git push origin HEAD:atomic-service-transitions-203
