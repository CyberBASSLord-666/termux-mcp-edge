name: Repair PR 216 shell declaration

on:
  workflow_dispatch:
  push:
    branches:
      - atomic-service-transitions-203
    paths:
      - .github/workflows/fix-pr216.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: atomic-service-transitions-203
          persist-credentials: true
      - name: Apply focused Bash repair
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/termux_deploy.sh')
          text = path.read_text()
          old = '  local sequence="$1" index_name="$2" -a results=(); local index result\n'
          new = '  local sequence="$1" index_name="$2" index result\n  local -a results=()\n'
          if text.count(old) != 1:
              raise SystemExit('expected declaration not found exactly once')
          path.write_text(text.replace(old, new))
          PY
          bash -n scripts/termux_deploy.sh
          rm -f .github/workflows/fix-pr216.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/termux_deploy.sh .github/workflows/fix-pr216.yml
          git diff --cached --check
          git commit -m "fix: declare Bash array separately"
          git push origin HEAD:atomic-service-transitions-203
