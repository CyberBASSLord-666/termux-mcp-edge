name: Publish Immutable Release

on:
  workflow_dispatch:
    inputs:
      expected_commit:
        description: Exact lowercase 40-character current main commit
        required: true
        type: string
      version:
        description: Exact MAJOR.MINOR.PATCH Cargo package version
        required: true
        type: string
      expected_tag_object_sha:
        description: Exact annotated version-tag object SHA
        required: true
        type: string
      staged_artifact_id:
        description: Exact successful Stage Release Assets artifact ID
        required: true
        type: string
      staged_artifact_sha256:
        description: Raw lowercase SHA-256 of the staged tar
        required: true
        type: string
      draft_release_id:
        description: Exact pre-created empty draft Release ID
        required: true
        type: string

permissions: {}

concurrency:
  group: production-release-publication
  cancel-in-progress: false

env:
  EXPECTED_COMMIT: ${{ inputs.expected_commit }}
  EXPECTED_VERSION: ${{ inputs.version }}
  EXPECTED_TAG_OBJECT_SHA: ${{ inputs.expected_tag_object_sha }}
  STAGED_ARTIFACT_ID: ${{ inputs.staged_artifact_id }}
  STAGED_ARTIFACT_SHA256: ${{ inputs.staged_artifact_sha256 }}
  DRAFT_RELEASE_ID: ${{ inputs.draft_release_id }}

jobs:
  preflight:
    name: Verify immutable publication inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout dispatch main source
        # actions/checkout@v7.0.0 resolved 2026-07-10
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate first-attempt dispatch source
        env:
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_VERSION: ${{ inputs.version }}
          EXPECTED_TAG_OBJECT_SHA: ${{ inputs.expected_tag_object_sha }}
          STAGED_ARTIFACT_ID: ${{ inputs.staged_artifact_id }}
          STAGED_ARTIFACT_SHA256: ${{ inputs.staged_artifact_sha256 }}
          DRAFT_RELEASE_ID: ${{ inputs.draft_release_id }}
        run: |
          set -euo pipefail
          [[ "$DISPATCH_REF" == refs/heads/main ]]
          [[ "$RUN_ATTEMPT" == 1 ]]
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$DISPATCH_SHA" == "$EXPECTED_COMMIT" ]]
          [[ "$EXPECTED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$EXPECTED_TAG_OBJECT_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$STAGED_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$STAGED_ARTIFACT_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$DRAFT_RELEASE_ID" =~ ^[1-9][0-9]*$ ]]
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          test -z "$(git status --short)"
          test "$(sed -n '0,/^version = /s/^version = "\([^"]*\)"/\1/p' Cargo.toml)" = "$EXPECTED_VERSION"

      - name: Resolve exact staged artifact
        id: stage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash scripts/publish_release_assets.sh resolve-stage \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$EXPECTED_COMMIT" \
            --version "$EXPECTED_VERSION" \
            --staged-artifact-id "$STAGED_ARTIFACT_ID" \
            --staged-artifact-sha256 "$STAGED_ARTIFACT_SHA256" \
            >>"$GITHUB_OUTPUT"

      - name: Prepare private verification workspace
        run: |
          set -euo pipefail
          install -d -m 700 "$RUNNER_TEMP/release-publication"
          install -d -m 700 "$RUNNER_TEMP/release-publication/stage"

      - name: Download exact staged tar by artifact ID
        # actions/download-artifact@v8.0.1 resolved 2026-07-19
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          artifact-ids: ${{ inputs.staged_artifact_id }}
          path: ${{ runner.temp }}/release-publication/stage
          merge-multiple: true
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.stage.outputs.stage_run_id }}
          digest-mismatch: error

      - name: Verify staged bytes and closed release asset set
        env:
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_VERSION: ${{ inputs.version }}
          STAGED_ARTIFACT_SHA256: ${{ inputs.staged_artifact_sha256 }}
        run: |
          set -euo pipefail
          stage_tar="$RUNNER_TEMP/release-publication/stage/termux-mcp-server-v${EXPECTED_VERSION}-release-stage-${EXPECTED_COMMIT:0:12}.tar"
          chmod 600 "$stage_tar"
          bash scripts/prepare_release_publication_assets.sh \
            --stage-tar "$stage_tar" \
            --staged-artifact-sha256 "$STAGED_ARTIFACT_SHA256" \
            --assets-dir "$RUNNER_TEMP/release-publication/assets" \
            --receipt "$RUNNER_TEMP/release-publication/release-publication-receipt-v1.json" \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$EXPECTED_COMMIT" \
            --version "$EXPECTED_VERSION"

      - name: Verify tag, stage, and exact empty draft
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash scripts/publish_release_assets.sh preflight \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$EXPECTED_COMMIT" \
            --version "$EXPECTED_VERSION" \
            --tag-object-sha "$EXPECTED_TAG_OBJECT_SHA" \
            --staged-artifact-id "$STAGED_ARTIFACT_ID" \
            --staged-artifact-sha256 "$STAGED_ARTIFACT_SHA256" \
            --draft-release-id "$DRAFT_RELEASE_ID" \
            --assets-dir "$RUNNER_TEMP/release-publication/assets" \
            --receipt "$RUNNER_TEMP/release-publication/release-publication-receipt-v1.json" \
            >"$RUNNER_TEMP/release-publication/preflight-identity.txt"

  attach-assets:
    name: Attach exact staged assets to draft
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: read
      contents: write
    environment:
      name: release-production
      deployment: false
    steps:
      - name: Require protected asset-attachment environment
        env:
          ENVIRONMENT_GUARD: ${{ vars.RELEASE_PRODUCTION_PROTECTED }}
        run: test "$ENVIRONMENT_GUARD" = asset-attachment-reviewer-main-only-v1

      - name: Checkout dispatch main source
        # actions/checkout@v7.0.0 resolved 2026-07-10
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate first-attempt dispatch source
        env:
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_VERSION: ${{ inputs.version }}
          EXPECTED_TAG_OBJECT_SHA: ${{ inputs.expected_tag_object_sha }}
          STAGED_ARTIFACT_ID: ${{ inputs.staged_artifact_id }}
          STAGED_ARTIFACT_SHA256: ${{ inputs.staged_artifact_sha256 }}
          DRAFT_RELEASE_ID: ${{ inputs.draft_release_id }}
        run: |
          set -euo pipefail
          [[ "$DISPATCH_REF" == refs/heads/main ]]
          [[ "$RUN_ATTEMPT" == 1 ]]
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$DISPATCH_SHA" == "$EXPECTED_COMMIT" ]]
          [[ "$EXPECTED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$EXPECTED_TAG_OBJECT_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$STAGED_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$STAGED_ARTIFACT_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$DRAFT_RELEASE_ID" =~ ^[1-9][0-9]*$ ]]
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          test -z "$(git status --short)"
          test "$(sed -n '0,/^version = /s/^version = "\([^"]*\)"/\1/p' Cargo.toml)" = "$EXPECTED_VERSION"

      - name: Resolve exact staged artifact again after approval
        id: stage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash scripts/publish_release_assets.sh resolve-stage \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$EXPECTED_COMMIT" \
            --version "$EXPECTED_VERSION" \
            --staged-artifact-id "$STAGED_ARTIFACT_ID" \
            --staged-artifact-sha256 "$STAGED_ARTIFACT_SHA256" \
            >>"$GITHUB_OUTPUT"

      - name: Prepare private verification workspace
        run: |
          set -euo pipefail
          install -d -m 700 "$RUNNER_TEMP/release-publication"
          install -d -m 700 "$RUNNER_TEMP/release-publication/stage"

      - name: Download exact staged tar again after approval
        # actions/download-artifact@v8.0.1 resolved 2026-07-19
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          artifact-ids: ${{ inputs.staged_artifact_id }}
          path: ${{ runner.temp }}/release-publication/stage
          merge-multiple: true
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.stage.outputs.stage_run_id }}
          digest-mismatch: error

      - name: Reverify staged bytes after approval
        env:
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_VERSION: ${{ inputs.version }}
          STAGED_ARTIFACT_SHA256: ${{ inputs.staged_artifact_sha256 }}
        run: |
          set -euo pipefail
          stage_tar="$RUNNER_TEMP/release-publication/stage/termux-mcp-server-v${EXPECTED_VERSION}-release-stage-${EXPECTED_COMMIT:0:12}.tar"
          chmod 600 "$stage_tar"
          bash scripts/prepare_release_publication_assets.sh \
            --stage-tar "$stage_tar" \
            --staged-artifact-sha256 "$STAGED_ARTIFACT_SHA256" \
            --assets-dir "$RUNNER_TEMP/release-publication/assets" \
            --receipt "$RUNNER_TEMP/release-publication/release-publication-receipt-v1.json" \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$EXPECTED_COMMIT" \
            --version "$EXPECTED_VERSION"

      - name: Attach the exact fixed asset set
        env:
          GH_TOKEN: ${{ github.token }}
          GH_ADMIN_READ_TOKEN: ${{ secrets.RELEASE_PRODUCTION_POLICY_READ_TOKEN }}
        run: |
          set -euo pipefail
          bash scripts/publish_release_assets.sh attach \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$EXPECTED_COMMIT" \
            --version "$EXPECTED_VERSION" \
            --tag-object-sha "$EXPECTED_TAG_OBJECT_SHA" \
            --staged-artifact-id "$STAGED_ARTIFACT_ID" \
            --staged-artifact-sha256 "$STAGED_ARTIFACT_SHA256" \
            --draft-release-id "$DRAFT_RELEASE_ID" \
            --assets-dir "$RUNNER_TEMP/release-publication/assets" \
            --receipt "$RUNNER_TEMP/release-publication/release-publication-receipt-v1.json" \
            --record "$RUNNER_TEMP/release-publication/release-attachment-record-v1.json" \
            >"$RUNNER_TEMP/release-publication/attachment-identity.txt"

      - name: Hash closed attachment record
        id: attachment-record-metadata
        run: |
          set -euo pipefail
          record="$RUNNER_TEMP/release-publication/release-attachment-record-v1.json"
          test -f "$record"
          test ! -L "$record"
          test "$(stat -c '%a' -- "$record")" = 600
          record_sha256="$(sha256sum -- "$record" | awk '{print $1}')"
          [[ "$record_sha256" =~ ^[0-9a-f]{64}$ ]]
          printf 'sha256=%s\n' "$record_sha256" >>"$GITHUB_OUTPUT"

      - name: Retain exact attachment identity record
        id: attachment-record
        # actions/upload-artifact@v7.0.1 resolved 2026-07-10
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-attachment-record-${{ inputs.expected_commit }}
          path: ${{ runner.temp }}/release-publication/release-attachment-record-v1.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          overwrite: false
          include-hidden-files: false

      - name: Summarize protected attachment
        env:
          RECORD_SHA256: ${{ steps.attachment-record-metadata.outputs.sha256 }}
          RECORD_ARTIFACT_ID: ${{ steps.attachment-record.outputs.artifact-id }}
          RECORD_ARTIFACT_DIGEST: ${{ steps.attachment-record.outputs.artifact-digest }}
          RECORD_ARTIFACT_URL: ${{ steps.attachment-record.outputs.artifact-url }}
        run: |
          set -euo pipefail
          record="$RUNNER_TEMP/release-publication/release-attachment-record-v1.json"
          [[ "$RECORD_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$RECORD_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$RECORD_ARTIFACT_DIGEST" =~ ^[0-9a-f]{64}$ ]]
          [[ "$RECORD_ARTIFACT_URL" == https://github.com/* ]]
          {
            printf '## Protected draft attachment verified\n\n'
            jq -r '"- Workflow run: [`\(.workflow.runId)`](\(.workflow.runUrl))\n- Release: [`\(.release.id)`](\(.release.url))\n- Source commit: `\(.source.commit)`\n- Staging run / artifact: `\(.stage.runId)` / `\(.stage.artifactId)`\n- Release assets: `\(.release.assetCount)`\n- Server asset-identity digest: `\(.release.serverAssetIdentitiesSha256)`"' "$record"
            printf -- '- Record file SHA-256: `%s`\n' "$RECORD_SHA256"
            printf -- '- Retained record artifact: [`%s`](%s)\n' "$RECORD_ARTIFACT_ID" "$RECORD_ARTIFACT_URL"
            printf -- '- Retained artifact server digest: `%s`\n' "$RECORD_ARTIFACT_DIGEST"
          } >>"$GITHUB_STEP_SUMMARY"

  verify-draft:
    name: Independently re-download and verify draft
    needs: attach-assets
    outputs:
      verification_record_artifact_id: ${{ steps.verification-record.outputs.artifact-id }}
      verification_record_artifact_digest: ${{ steps.verification-record.outputs.artifact-digest }}
      verification_record_file_sha256: ${{ steps.verification-record-metadata.outputs.sha256 }}
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout dispatch main source
        # actions/checkout@v7.0.0 resolved 2026-07-10
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate first-attempt dispatch source
        env:
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_VERSION: ${{ inputs.version }}
          EXPECTED_TAG_OBJECT_SHA: ${{ inputs.expected_tag_object_sha }}
          STAGED_ARTIFACT_ID: ${{ inputs.staged_artifact_id }}
          STAGED_ARTIFACT_SHA256: ${{ inputs.staged_artifact_sha256 }}
          DRAFT_RELEASE_ID: ${{ inputs.draft_release_id }}
        run: |
          set -euo pipefail
          [[ "$DISPATCH_REF" == refs/heads/main ]]
          [[ "$RUN_ATTEMPT" == 1 ]]
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$DISPATCH_SHA" == "$EXPECTED_COMMIT" ]]
          [[ "$EXPECTED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$EXPECTED_TAG_OBJECT_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$STAGED_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$STAGED_ARTIFACT_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$DRAFT_RELEASE_ID" =~ ^[1-9][0-9]*$ ]]
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          test -z "$(git status --short)"
          test "$(sed -n '0,/^version = /s/^version = "\([^"]*\)"/\1/p' Cargo.toml)" = "$EXPECTED_VERSION"

      - name: Resolve exact staged artifact again
        id: stage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash scripts/publish_release_assets.sh resolve-stage \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$EXPECTED_COMMIT" \
            --version "$EXPECTED_VERSION" \
            --staged-artifact-id "$STAGED_ARTIFACT_ID" \
            --staged-artifact-sha256 "$STAGED_ARTIFACT_SHA256" \
            >>"$GITHUB_OUTPUT"

      - name: Prepare private verification workspace
        run: |
          set -euo pipefail
          install -d -m 700 "$RUNNER_TEMP/release-publication"
          install -d -m 700 "$RUNNER_TEMP/release-publication/stage"

      - name: Download exact staged tar again
        # actions/download-artifact@v8.0.1 resolved 2026-07-19
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          artifact-ids: ${{ inputs.staged_artifact_id }}
          path: ${{ runner.temp }}/release-publication/stage
          merge-multiple: true
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.stage.outputs.stage_run_id }}
          digest-mismatch: error

      - name: Reverify staged bytes independently
        env:
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_VERSION: ${{ inputs.version }}
          STAGED_ARTIFACT_SHA256: ${{ inputs.staged_artifact_sha256 }}
        run: |
          set -euo pipefail
          stage_tar="$RUNNER_TEMP/release-publication/stage/termux-mcp-server-v${EXPECTED_VERSION}-release-stage-${EXPECTED_COMMIT:0:12}.tar"
          chmod 600 "$stage_tar"
          bash scripts/prepare_release_publication_assets.sh \
            --stage-tar "$stage_tar" \
            --staged-artifact-sha256 "$STAGED_ARTIFACT_SHA256" \
            --assets-dir "$RUNNER_TEMP/release-publication/assets" \
            --receipt "$RUNNER_TEMP/release-publication/release-publication-receipt-v1.json" \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$EXPECTED_COMMIT" \
            --version "$EXPECTED_VERSION"

      - name: Re-download every draft asset by exact ID
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash scripts/publish_release_assets.sh verify \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$EXPECTED_COMMIT" \
            --version "$EXPECTED_VERSION" \
            --tag-object-sha "$EXPECTED_TAG_OBJECT_SHA" \
            --staged-artifact-id "$STAGED_ARTIFACT_ID" \
            --staged-artifact-sha256 "$STAGED_ARTIFACT_SHA256" \
            --draft-release-id "$DRAFT_RELEASE_ID" \
            --assets-dir "$RUNNER_TEMP/release-publication/assets" \
            --receipt "$RUNNER_TEMP/release-publication/release-publication-receipt-v1.json" \
            --record "$RUNNER_TEMP/release-publication/release-draft-verification-record-v1.json" \
            >"$RUNNER_TEMP/release-publication/draft-verification-identity.txt"

      - name: Hash closed independent-verification record
        id: verification-record-metadata
        run: |
          set -euo pipefail
          record="$RUNNER_TEMP/release-publication/release-draft-verification-record-v1.json"
          test -f "$record"
          test ! -L "$record"
          test "$(stat -c '%a' -- "$record")" = 600
          record_sha256="$(sha256sum -- "$record" | awk '{print $1}')"
          [[ "$record_sha256" =~ ^[0-9a-f]{64}$ ]]
          printf 'sha256=%s\n' "$record_sha256" >>"$GITHUB_OUTPUT"

      - name: Retain independent draft-verification record
        id: verification-record
        # actions/upload-artifact@v7.0.1 resolved 2026-07-10
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: release-draft-verification-record-${{ inputs.expected_commit }}
          path: ${{ runner.temp }}/release-publication/release-draft-verification-record-v1.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          overwrite: false
          include-hidden-files: false

      - name: Present independent record to final reviewer
        env:
          RECORD_SHA256: ${{ steps.verification-record-metadata.outputs.sha256 }}
          RECORD_ARTIFACT_ID: ${{ steps.verification-record.outputs.artifact-id }}
          RECORD_ARTIFACT_DIGEST: ${{ steps.verification-record.outputs.artifact-digest }}
          RECORD_ARTIFACT_URL: ${{ steps.verification-record.outputs.artifact-url }}
        run: |
          set -euo pipefail
          record="$RUNNER_TEMP/release-publication/release-draft-verification-record-v1.json"
          [[ "$RECORD_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$RECORD_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$RECORD_ARTIFACT_DIGEST" =~ ^[0-9a-f]{64}$ ]]
          [[ "$RECORD_ARTIFACT_URL" == https://github.com/* ]]
          {
            printf '## Independent draft bytes verified\n\n'
            jq -r '"- Workflow run: [`\(.workflow.runId)`](\(.workflow.runUrl))\n- Release: [`\(.release.id)`](\(.release.url))\n- Source commit: `\(.source.commit)`\n- Staging run / artifact: `\(.stage.runId)` / `\(.stage.artifactId)`\n- Release body SHA-256: `\(.release.bodySha256)`\n- Expected asset-set digest: `\(.release.expectedAssetSetSha256)`\n- Server asset-identity digest: `\(.release.serverAssetIdentitiesSha256)`\n- Independently downloaded assets: `\(.release.assetCount)`"' "$record"
            printf -- '- Record file SHA-256: `%s`\n' "$RECORD_SHA256"
            printf -- '- Retained record artifact: [`%s`](%s)\n' "$RECORD_ARTIFACT_ID" "$RECORD_ARTIFACT_URL"
            printf -- '- Retained artifact server digest: `%s`\n\n' "$RECORD_ARTIFACT_DIGEST"
            printf '| Asset ID | Name | Bytes | Server SHA-256 |\n'
            printf '| ---: | --- | ---: | --- |\n'
            jq -r '.release.assets[] | "| `\(.id)` | `\(.name)` | \(.size) | `\(.digest | sub("^sha256:"; ""))` |"' "$record"
          } >>"$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish verified immutable release
    needs: verify-draft
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      actions: read
      contents: write
    environment:
      name: release-final
      deployment: false
    steps:
      - name: Require protected final-publication environment
        env:
          ENVIRONMENT_GUARD: ${{ vars.RELEASE_FINAL_PROTECTED }}
        run: test "$ENVIRONMENT_GUARD" = final-publication-reviewer-main-only-immutable-v1

      - name: Checkout dispatch main source
        # actions/checkout@v7.0.0 resolved 2026-07-10
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate first-attempt dispatch source
        env:
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_VERSION: ${{ inputs.version }}
          EXPECTED_TAG_OBJECT_SHA: ${{ inputs.expected_tag_object_sha }}
          STAGED_ARTIFACT_ID: ${{ inputs.staged_artifact_id }}
          STAGED_ARTIFACT_SHA256: ${{ inputs.staged_artifact_sha256 }}
          DRAFT_RELEASE_ID: ${{ inputs.draft_release_id }}
        run: |
          set -euo pipefail
          [[ "$DISPATCH_REF" == refs/heads/main ]]
          [[ "$RUN_ATTEMPT" == 1 ]]
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$DISPATCH_SHA" == "$EXPECTED_COMMIT" ]]
          [[ "$EXPECTED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$EXPECTED_TAG_OBJECT_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$STAGED_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$STAGED_ARTIFACT_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$DRAFT_RELEASE_ID" =~ ^[1-9][0-9]*$ ]]
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          test -z "$(git status --short)"
          test "$(sed -n '0,/^version = /s/^version = "\([^"]*\)"/\1/p' Cargo.toml)" = "$EXPECTED_VERSION"

      - name: Validate retained draft-verification artifact identity
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          WORKFLOW_RUN_ID: ${{ github.run_id }}
          VERIFICATION_RECORD_ARTIFACT_ID: ${{ needs.verify-draft.outputs.verification_record_artifact_id }}
          VERIFICATION_RECORD_ARTIFACT_DIGEST: ${{ needs.verify-draft.outputs.verification_record_artifact_digest }}
          VERIFICATION_RECORD_FILE_SHA256: ${{ needs.verify-draft.outputs.verification_record_file_sha256 }}
        run: |
          set -euo pipefail
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$WORKFLOW_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$VERIFICATION_RECORD_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$VERIFICATION_RECORD_ARTIFACT_DIGEST" =~ ^[0-9a-f]{64}$ ]]
          [[ "$VERIFICATION_RECORD_FILE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          install -d -m 700 "$RUNNER_TEMP/release-publication"
          install -d -m 700 "$RUNNER_TEMP/release-publication/verification-record"
          artifact_json="$RUNNER_TEMP/release-publication/verification-record-artifact.json"
          curl_exit=0
          http_code=000
          for attempt in 1 2 3; do
            set +e
            http_code="$(curl \
              --silent --show-error \
              --proto '=https' --tlsv1.2 \
              --connect-timeout 10 --max-time 30 \
              --header "Authorization: Bearer $GH_TOKEN" \
              --header 'Accept: application/vnd.github+json' \
              --header 'X-GitHub-Api-Version: 2026-03-10' \
              --output "$artifact_json" \
              --write-out '%{http_code}' \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/artifacts/$VERIFICATION_RECORD_ARTIFACT_ID")"
            curl_exit=$?
            set -e
            [[ "$http_code" =~ ^[0-9]{3}$ ]] || http_code=000
            if ((curl_exit == 0)) && [[ "$http_code" == 200 ]]; then
              break
            fi
            transient=false
            if ((curl_exit != 0)); then
              transient=true
            else
              case "$http_code" in
                408|425|429|500|502|503|504) transient=true ;;
              esac
            fi
            if [[ "$transient" != true || "$attempt" == 3 ]]; then
              break
            fi
            sleep "$attempt"
          done
          test "$curl_exit" = 0
          test "$http_code" = 200
          jq -e \
            --argjson artifact_id "$VERIFICATION_RECORD_ARTIFACT_ID" \
            --arg name "release-draft-verification-record-$EXPECTED_COMMIT" \
            --arg digest "sha256:$VERIFICATION_RECORD_ARTIFACT_DIGEST" \
            --argjson run_id "$WORKFLOW_RUN_ID" \
            --arg commit "$EXPECTED_COMMIT" '
              .id == $artifact_id
              and .name == $name
              and .digest == $digest
              and .expired == false
              and .workflow_run.id == $run_id
              and .workflow_run.head_branch == "main"
              and .workflow_run.head_sha == $commit
            ' "$artifact_json" >/dev/null

      - name: Download exact independent-verification record
        # actions/download-artifact@v8.0.1 resolved 2026-07-19
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          artifact-ids: ${{ needs.verify-draft.outputs.verification_record_artifact_id }}
          path: ${{ runner.temp }}/release-publication/verification-record
          merge-multiple: true
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.run_id }}
          digest-mismatch: error

      - name: Verify independent-record bytes before publication
        env:
          VERIFICATION_RECORD_FILE_SHA256: ${{ needs.verify-draft.outputs.verification_record_file_sha256 }}
        run: |
          set -euo pipefail
          record_dir="$RUNNER_TEMP/release-publication/verification-record"
          record="$record_dir/release-draft-verification-record-v1.json"
          test "$(find "$record_dir" -mindepth 1 -maxdepth 1 -printf '%f\n' | sort)" = release-draft-verification-record-v1.json
          test -f "$record"
          test ! -L "$record"
          chmod 600 "$record"
          test "$(sha256sum -- "$record" | awk '{print $1}')" = "$VERIFICATION_RECORD_FILE_SHA256"
          jq -e '
            keys == ["phase","recordType","release","repository","schemaVersion","source","stage","workflow"]
            and .schemaVersion == 1
            and .recordType == "release-publication-identity"
            and .phase == "verify"
            and .release.assetCount == 16
            and (.release.assets | type == "array" and length == 16)
          ' "$record" >/dev/null

      - name: Resolve exact staged artifact after final approval
        id: stage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash scripts/publish_release_assets.sh resolve-stage \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$EXPECTED_COMMIT" \
            --version "$EXPECTED_VERSION" \
            --staged-artifact-id "$STAGED_ARTIFACT_ID" \
            --staged-artifact-sha256 "$STAGED_ARTIFACT_SHA256" \
            >>"$GITHUB_OUTPUT"

      - name: Prepare private verification workspace
        run: |
          set -euo pipefail
          install -d -m 700 "$RUNNER_TEMP/release-publication"
          install -d -m 700 "$RUNNER_TEMP/release-publication/stage"

      - name: Download exact staged tar after final approval
        # actions/download-artifact@v8.0.1 resolved 2026-07-19
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          artifact-ids: ${{ inputs.staged_artifact_id }}
          path: ${{ runner.temp }}/release-publication/stage
          merge-multiple: true
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.stage.outputs.stage_run_id }}
          digest-mismatch: error

      - name: Reverify every staged byte after final approval
        env:
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_VERSION: ${{ inputs.version }}
          STAGED_ARTIFACT_SHA256: ${{ inputs.staged_artifact_sha256 }}
        run: |
          set -euo pipefail
          stage_tar="$RUNNER_TEMP/release-publication/stage/termux-mcp-server-v${EXPECTED_VERSION}-release-stage-${EXPECTED_COMMIT:0:12}.tar"
          chmod 600 "$stage_tar"
          bash scripts/prepare_release_publication_assets.sh \
            --stage-tar "$stage_tar" \
            --staged-artifact-sha256 "$STAGED_ARTIFACT_SHA256" \
            --assets-dir "$RUNNER_TEMP/release-publication/assets" \
            --receipt "$RUNNER_TEMP/release-publication/release-publication-receipt-v1.json" \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$EXPECTED_COMMIT" \
            --version "$EXPECTED_VERSION"

      - name: Re-download, publish once, and verify immutable response
        env:
          GH_TOKEN: ${{ github.token }}
          GH_ADMIN_READ_TOKEN: ${{ secrets.RELEASE_FINAL_POLICY_READ_TOKEN }}
        run: |
          set -euo pipefail
          bash scripts/publish_release_assets.sh publish \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$EXPECTED_COMMIT" \
            --version "$EXPECTED_VERSION" \
            --tag-object-sha "$EXPECTED_TAG_OBJECT_SHA" \
            --staged-artifact-id "$STAGED_ARTIFACT_ID" \
            --staged-artifact-sha256 "$STAGED_ARTIFACT_SHA256" \
            --draft-release-id "$DRAFT_RELEASE_ID" \
            --assets-dir "$RUNNER_TEMP/release-publication/assets" \
            --receipt "$RUNNER_TEMP/release-publication/release-publication-receipt-v1.json" \
            --verification-record "$RUNNER_TEMP/release-publication/verification-record/release-draft-verification-record-v1.json" \
            >"$RUNNER_TEMP/release-publication/publication-identity.txt"

  postverify:
    name: Independently verify public immutable release
    needs: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    permissions:
      actions: read
      contents: read
    steps:
      - name: Checkout dispatch main source
        # actions/checkout@v7.0.0 resolved 2026-07-10
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate first-attempt dispatch source
        env:
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_VERSION: ${{ inputs.version }}
          EXPECTED_TAG_OBJECT_SHA: ${{ inputs.expected_tag_object_sha }}
          STAGED_ARTIFACT_ID: ${{ inputs.staged_artifact_id }}
          STAGED_ARTIFACT_SHA256: ${{ inputs.staged_artifact_sha256 }}
          DRAFT_RELEASE_ID: ${{ inputs.draft_release_id }}
        run: |
          set -euo pipefail
          [[ "$DISPATCH_REF" == refs/heads/main ]]
          [[ "$RUN_ATTEMPT" == 1 ]]
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$DISPATCH_SHA" == "$EXPECTED_COMMIT" ]]
          [[ "$EXPECTED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$EXPECTED_TAG_OBJECT_SHA" =~ ^[0-9a-f]{40}$ ]]
          [[ "$STAGED_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$STAGED_ARTIFACT_SHA256" =~ ^[0-9a-f]{64}$ ]]
          [[ "$DRAFT_RELEASE_ID" =~ ^[1-9][0-9]*$ ]]
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          test -z "$(git status --short)"
          test "$(sed -n '0,/^version = /s/^version = "\([^"]*\)"/\1/p' Cargo.toml)" = "$EXPECTED_VERSION"

      - name: Resolve exact staged artifact one final time
        id: stage
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          bash scripts/publish_release_assets.sh resolve-stage \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$EXPECTED_COMMIT" \
            --version "$EXPECTED_VERSION" \
            --staged-artifact-id "$STAGED_ARTIFACT_ID" \
            --staged-artifact-sha256 "$STAGED_ARTIFACT_SHA256" \
            >>"$GITHUB_OUTPUT"

      - name: Prepare private verification workspace
        run: |
          set -euo pipefail
          install -d -m 700 "$RUNNER_TEMP/release-publication"
          install -d -m 700 "$RUNNER_TEMP/release-publication/stage"

      - name: Download exact staged tar one final time
        # actions/download-artifact@v8.0.1 resolved 2026-07-19
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          artifact-ids: ${{ inputs.staged_artifact_id }}
          path: ${{ runner.temp }}/release-publication/stage
          merge-multiple: true
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.stage.outputs.stage_run_id }}
          digest-mismatch: error

      - name: Reverify exact staged bytes one final time
        env:
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_VERSION: ${{ inputs.version }}
          STAGED_ARTIFACT_SHA256: ${{ inputs.staged_artifact_sha256 }}
        run: |
          set -euo pipefail
          stage_tar="$RUNNER_TEMP/release-publication/stage/termux-mcp-server-v${EXPECTED_VERSION}-release-stage-${EXPECTED_COMMIT:0:12}.tar"
          chmod 600 "$stage_tar"
          bash scripts/prepare_release_publication_assets.sh \
            --stage-tar "$stage_tar" \
            --staged-artifact-sha256 "$STAGED_ARTIFACT_SHA256" \
            --assets-dir "$RUNNER_TEMP/release-publication/assets" \
            --receipt "$RUNNER_TEMP/release-publication/release-publication-receipt-v1.json" \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$EXPECTED_COMMIT" \
            --version "$EXPECTED_VERSION"

      - name: Verify public immutable identity and bytes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          {
            printf '## Immutable public Release proof passed\n\n'
            printf 'immutable=true\n'
            printf 'public_asset_redownloads=16\n'
            bash scripts/publish_release_assets.sh postverify \
              --repository "$GITHUB_REPOSITORY" \
              --commit "$EXPECTED_COMMIT" \
              --version "$EXPECTED_VERSION" \
              --tag-object-sha "$EXPECTED_TAG_OBJECT_SHA" \
              --staged-artifact-id "$STAGED_ARTIFACT_ID" \
              --staged-artifact-sha256 "$STAGED_ARTIFACT_SHA256" \
              --draft-release-id "$DRAFT_RELEASE_ID" \
              --assets-dir "$RUNNER_TEMP/release-publication/assets" \
              --receipt "$RUNNER_TEMP/release-publication/release-publication-receipt-v1.json"
          } | tee "$GITHUB_STEP_SUMMARY"
