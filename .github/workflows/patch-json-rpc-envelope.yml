name: Integrate JSON-RPC envelope validation

on:
  push:
    branches:
      - json-rpc-envelope-186

permissions:
  contents: write

concurrency:
  group: patch-json-rpc-envelope-186
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: json-rpc-envelope-186
          fetch-depth: 0
          persist-credentials: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt

      - name: Apply focused transport integration
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('src/mcp_transport.rs')
          text = path.read_text()

          import_marker = '    error::AppError,\n    platform_info::collect_platform_info,'
          import_replacement = '''    error::AppError,
              json_rpc::{parse_incoming_message, IncomingJsonRpcMessage, JsonRpcEnvelopeError},
              platform_info::collect_platform_info,'''.replace('              ', '')
          if import_marker not in text:
              raise SystemExit('import marker not found')
          text = text.replace(import_marker, import_replacement, 1)

          struct_start = text.index('#[derive(Debug, Deserialize)]\nstruct JsonRpcRequest')
          struct_end = text.index('#[derive(Debug, Deserialize)]\nstruct ToolCallParams', struct_start)
          text = text[:struct_start] + text[struct_end:]

          block_start = text.index('    let request = match serde_json::from_slice::<JsonRpcRequest>(&body) {')
          response_marker = '\n}\n\n#[rustfmt::skip]\nfn initialize_response'
          block_end = text.index(response_marker, block_start)
          replacement = '''    let message = match parse_incoming_message(&body) {
                  Ok(message) => message,
                  Err(JsonRpcEnvelopeError::ParseError { detail }) => {
                      return (
                          StatusCode::BAD_REQUEST,
                          Json(json!({
                              "jsonrpc": "2.0",
                              "id": Value::Null,
                              "error": {
                                  "code": -32700,
                                  "message": "Parse error",
                                  "data": detail,
                              },
                          })),
                      )
                          .into_response();
                  }
                  Err(JsonRpcEnvelopeError::InvalidRequest { id, reason }) => {
                      return invalid_request(id, reason);
                  }
              };

              match message {
                  IncomingJsonRpcMessage::Request { id, method, params } => match method.as_str() {
                      "initialize" => initialize_response(Some(id)),
                      "tools/list" => tools_list_response(Some(id)),
                      "tools/call" => handle_tool_call(Some(id), params, &state).await,
                      _ => method_not_available(
                          Some(id),
                          "Only initialize, tools/list, and tools/call are available in this staged runtime.",
                      ),
                  },
                  IncomingJsonRpcMessage::Notification { method, params: _ } => {
                      handle_notification(&method)
                  }
              }
          '''.replace('              ', '')
          text = text[:block_start] + replacement + text[block_end:]

          notification_marker = '#[rustfmt::skip]\nfn initialize_response'
          notification = '''fn handle_notification(method: &str) -> Response {
              match method {
                  "notifications/initialized" => StatusCode::NO_CONTENT.into_response(),
                  _ => StatusCode::NO_CONTENT.into_response(),
              }
          }

          #[rustfmt::skip]
          fn initialize_response'''.replace('          ', '')
          if notification_marker not in text:
              raise SystemExit('notification marker not found')
          text = text.replace(notification_marker, notification, 1)

          path.write_text(text)
          PY

          cargo fmt --all

      - name: Commit integration
        run: |
          if git diff --quiet -- src/mcp_transport.rs src/json_rpc.rs src/lib.rs; then
            echo 'No integration changes required.'
            exit 0
          fi
          git add src/mcp_transport.rs src/json_rpc.rs src/lib.rs
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Wire strict JSON-RPC envelopes into MCP transport'
          git push origin HEAD:json-rpc-envelope-186
