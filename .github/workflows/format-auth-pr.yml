name: Format authentication remediation

on:
  push:
    branches:
      - auth-mcp-167

permissions:
  contents: write

concurrency:
  group: format-auth-mcp-167
  cancel-in-progress: true

jobs:
  format:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: auth-mcp-167
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt

      - name: Apply rustfmt
        run: cargo fmt --all

      - name: Commit formatting changes
        run: |
          if git diff --quiet -- '*.rs'; then
            echo 'No Rust formatting changes required.'
            exit 0
          fi
          git add -- '*.rs'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Apply rustfmt to MCP authentication changes'
          git push origin HEAD:auth-mcp-167
