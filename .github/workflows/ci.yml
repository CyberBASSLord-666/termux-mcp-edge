name: CI

on:
  push:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - "scripts/**"
      - "docs/*release-evidence-schema-v1.json"
      - "docs/android-battery-emulated-evidence-schema-v*.json"
      - "docs/android-volume-emulated-evidence-schema-v*.json"
      - "docs/command-emulated-evidence-schema-v*.json"
      - "docs/release-observation-requirement-schema-v1.json"
      - "docs/release-observation-inheritance-schema-v1.json"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - "scripts/**"
      - "docs/*release-evidence-schema-v1.json"
      - "docs/android-battery-emulated-evidence-schema-v*.json"
      - "docs/android-volume-emulated-evidence-schema-v*.json"
      - "docs/command-emulated-evidence-schema-v*.json"
      - "docs/release-observation-requirement-schema-v1.json"
      - "docs/release-observation-inheritance-schema-v1.json"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust validation
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Verify Rust toolchain
        run: |
          test "$(rustc --version | awk '{print $2}')" = "1.88.0"
          test "$(cargo --version | awk '{print $2}')" = "1.88.0"

      - name: Cache cargo registry and build outputs
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Apply staged durable replay ledger
        id: apply
        continue-on-error: true
        run: |
          set +e
          (
            set -euo pipefail
            python3 -m py_compile .github/remediation/apply_directory_replay_ledger.py
            python3 .github/remediation/apply_directory_replay_ledger.py
            cargo fmt --all
            git diff --check
          ) 2>&1 | tee /tmp/replay-apply.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish applicator diagnostic
        if: steps.apply.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          { printf 'Durable replay applicator diagnostic:\n\n```text\n'; tail -n 160 /tmp/replay-apply.log; printf '```\n'; } > /tmp/replay-diagnostic.md
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/replay-diagnostic.md

      - name: Enforce applicator result
        if: steps.apply.outputs.status != '0'
        run: exit 1

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy default
        id: clippy_default
        continue-on-error: true
        env:
          CARGO_TERM_COLOR: never
        run: |
          set +e
          cargo clippy --workspace --all-targets -- -D warnings 2>&1 | tee /tmp/replay-clippy-default.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish default Clippy diagnostic
        if: steps.clippy_default.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          { printf 'Durable replay default Clippy diagnostic:\n\n```text\n'; tail -n 220 /tmp/replay-clippy-default.log; printf '```\n'; } > /tmp/replay-diagnostic.md
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/replay-diagnostic.md

      - name: Enforce default Clippy
        if: steps.clippy_default.outputs.status != '0'
        run: exit 1

      - name: Clippy all features
        id: clippy_all
        continue-on-error: true
        env:
          CARGO_TERM_COLOR: never
        run: |
          set +e
          cargo clippy --workspace --all-targets --all-features -- -D warnings 2>&1 | tee /tmp/replay-clippy-all.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish all-feature Clippy diagnostic
        if: steps.clippy_all.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          { printf 'Durable replay all-feature Clippy diagnostic:\n\n```text\n'; tail -n 260 /tmp/replay-clippy-all.log; printf '```\n'; } > /tmp/replay-diagnostic.md
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/replay-diagnostic.md

      - name: Enforce all-feature Clippy
        if: steps.clippy_all.outputs.status != '0'
        run: exit 1

      - name: Tests default
        run: cargo test --workspace --all-targets

      - name: Tests all features
        id: tests_all
        continue-on-error: true
        env:
          CARGO_TERM_COLOR: never
        run: |
          set +e
          cargo test --workspace --all-targets --all-features 2>&1 | tee /tmp/replay-tests-all.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish all-feature test diagnostic
        if: steps.tests_all.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          { printf 'Durable replay all-feature test diagnostic:\n\n```text\n'; tail -n 300 /tmp/replay-tests-all.log; printf '```\n'; } > /tmp/replay-diagnostic.md
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/replay-diagnostic.md

      - name: Enforce all-feature tests
        if: steps.tests_all.outputs.status != '0'
        run: exit 1

      - name: Shell contract tests
        run: |
          bash tests/package_android_artifact_test.sh
          bash tests/termux_deploy_test.sh
          bash tests/termux_device_smoke_test.sh
          bash tests/termux_emulated_gate_test.sh
          bash tests/termux_release_validate_test.sh
          bash tests/setup_named_tunnel_test.sh
          bash -n scripts/termux_command_emulated_gate.sh
          jq -e '.type == "object" and .additionalProperties == false' docs/command-emulated-evidence-schema-v1.json >/dev/null

      - name: Publish validated replay ledger and restore CI
        env:
          EXPECTED_BRANCH: create-directory-capability-grant-248
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "$EXPECTED_BRANCH"
          git fetch --no-tags origin main
          rm .github/remediation/apply_directory_replay_ledger.py
          rm -rf .github/remediation/__pycache__
          rmdir .github/remediation
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock src/config.rs src/directory_grant.rs src/directory_replay.rs src/lib.rs src/main.rs .github/remediation/apply_directory_replay_ledger.py .github/workflows/ci.yml
          git diff --cached --check
          git commit -m "feat: add crash-durable directory grant replay ledger"
          git push origin "HEAD:$EXPECTED_BRANCH"
