name: CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: replay-clippy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust validation
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: create-directory-capability-grant-248
          fetch-depth: 0
          persist-credentials: true

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Cache cargo registry and build outputs
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Apply canonical formatting
        run: |
          set -euo pipefail
          cargo fmt --all
          git diff --check

      - name: Clippy default posture
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy all features diagnostic
        id: clippy_all
        continue-on-error: true
        env:
          CARGO_TERM_COLOR: never
        run: |
          set +e
          cargo clippy --workspace --all-targets --all-features -- -D warnings 2>&1 | tee /tmp/replay-clippy-all.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish all-feature Clippy diagnostic
        if: steps.clippy_all.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          { printf 'Durable replay all-features Clippy diagnostic for `%s`:\n\n```text\n' "$GITHUB_SHA"; tail -n 260 /tmp/replay-clippy-all.log; printf '```\n'; } > /tmp/replay-diagnostic.md
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/replay-diagnostic.md

      - name: Publish canonical formatting and restore permanent CI
        if: always() && steps.clippy_all.outcome != 'skipped'
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "create-directory-capability-grant-248"
          git fetch --no-tags origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/config.rs src/directory_grant.rs src/directory_replay.rs src/lib.rs src/main.rs .github/workflows/ci.yml
          git diff --cached --check
          if ! git diff --cached --quiet; then
            git commit -m "style: format durable replay ledger implementation"
            git push origin HEAD:create-directory-capability-grant-248
          fi

      - name: Enforce all-feature Clippy
        if: steps.clippy_all.outputs.status != '0'
        run: exit 1
