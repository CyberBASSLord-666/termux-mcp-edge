name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  rust:
    name: Rust validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v4 resolved 2026-06-26
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain@stable resolved 2026-06-26
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build outputs
        # Swatinem/rust-cache@v2 resolved 2026-06-26
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Capture clippy diagnostics
        run: cargo clippy --all-targets --all-features -- -D warnings 2>&1 | tee clippy.log
        continue-on-error: true

      - name: Upload clippy diagnostics
        if: always()
        # actions/upload-artifact@v4 resolved 2026-06-26
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: clippy-diagnostics
          path: clippy.log
          if-no-files-found: ignore

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all-features
