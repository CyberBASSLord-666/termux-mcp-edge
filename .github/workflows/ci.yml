name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  rust:
    name: Rust validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build outputs
        uses: Swatinem/rust-cache@v2

      - name: Capture rmcp API diagnostics
        run: |
          cargo fetch
          rmcp_dir="$(find "${CARGO_HOME:-$HOME/.cargo}/registry/src" -type d -path "*/rmcp-0.1.5" | head -n 1)"
          mkdir -p rmcp-diagnostics
          cp "$rmcp_dir/src/handler/server/tool.rs" rmcp-diagnostics/tool.rs
          grep -R "Parameters" "$rmcp_dir/src" > rmcp-diagnostics/parameters.txt || true
          grep -R "IntoCallToolResult" "$rmcp_dir/src" > rmcp-diagnostics/into-call-tool-result.txt || true
          find "$rmcp_dir" -maxdepth 3 -type f | sort > rmcp-diagnostics/files.txt
        continue-on-error: true

      - name: Upload rmcp API diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rmcp-api-diagnostics
          path: rmcp-diagnostics
          if-no-files-found: ignore

      - name: Capture rustfmt diagnostics
        run: cargo fmt --all -- --check 2>&1 | tee rustfmt.log
        continue-on-error: true

      - name: Upload rustfmt diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-diagnostics
          path: rustfmt.log
          if-no-files-found: ignore

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Capture clippy diagnostics
        run: cargo clippy --all-targets --all-features -- -D warnings 2>&1 | tee clippy.log
        continue-on-error: true

      - name: Upload clippy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: clippy-diagnostics
          path: clippy.log
          if-no-files-found: ignore

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all-features
