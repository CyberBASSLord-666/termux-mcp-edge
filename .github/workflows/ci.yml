name: CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - "src/**"
      - ".github/remediation/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: replay-publish-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    name: Publish validated replay subsystem
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: create-directory-capability-grant-248
          fetch-depth: 0
          persist-credentials: true

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.88.0
          components: rustfmt

      - name: Apply and verify owner-only fixture repair
        run: |
          set -euo pipefail
          python3 -m py_compile .github/remediation/fix_replay_clippy.py
          python3 .github/remediation/fix_replay_clippy.py
          cargo fmt --all
          cargo fmt --all -- --check
          cargo test --workspace --all-features directory_replay::tests
          git diff --check

      - name: Publish permanent replay source and restore read-only CI
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "create-directory-capability-grant-248"
          git fetch --no-tags origin main
          rm -f .github/replay-test-diagnostic.txt .github/replay-clippy-diagnostic.txt .github/replay-shell-diagnostic.txt
          rm .github/remediation/fix_replay_clippy.py
          rm -rf .github/remediation/__pycache__
          rmdir .github/remediation
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix: finalize crash-durable replay safeguards"
          git push origin HEAD:create-directory-capability-grant-248
