name: CI

on:
  push:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust validation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt, clippy
      - name: Patch read_file transport status mapping
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path
          path = Path('src/mcp_transport.rs')
          source = path.read_text()
          old = '''        Err(AppError::FileTooLarge { .. }) => {
              invalid_params(id, "File content exceeds the staged read_file byte limit.")
          }
          '''
          new = '''        Err(AppError::FileTooLarge { .. }) => payload_too_large(
              id,
              "File content exceeds the staged read_file byte limit.",
          ),
          '''
          if old not in source:
              old = '''        Err(AppError::FileTooLarge { .. }) => {
            invalid_params(id, "File content exceeds the staged read_file byte limit.")
        }
'''
              new = '''        Err(AppError::FileTooLarge { .. }) => payload_too_large(
            id,
            "File content exceeds the staged read_file byte limit.",
        ),
'''
          if old not in source:
              raise SystemExit('FileTooLarge arm not found')
          path.write_text(source.replace(old, new))
          PY
          cargo fmt --all
          git add src/mcp_transport.rs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Use payload-too-large response for read_file limit"
          git push origin HEAD:automation/safe-rooted-read-file
      - name: Cache cargo registry and build outputs
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Tests
        run: cargo test --workspace --all-targets --all-features
