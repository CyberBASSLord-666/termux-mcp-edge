name: CI

on:
  push:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repair:
    name: Apply focused branch repair
    if: github.event_name == 'pull_request' && github.head_ref == 'atomic-service-transitions-203'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout active branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: atomic-service-transitions-203
          persist-credentials: true
      - name: Repair candidate cleanup and remove temporary automation
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/termux_deploy.sh')
          text = path.read_text()
          old = '  stop_service_confirmed || fail "deployment aborted because canonical service shutdown was not confirmed"\n'
          new = '''  if ! stop_service_confirmed; then
            run rm -rf -- "$release_dir"
            TRANSACTION_ACTIVE=0
            fail "deployment aborted because canonical service shutdown was not confirmed"
          fi
          '''
          if text.count(old) != 1:
              raise SystemExit(f'expected exactly one stop-failure site, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          PY
          rm -f .github/workflows/repair-stop-failure-candidate.yml
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          bash -n scripts/termux_deploy.sh
          bash tests/termux_deploy_test.sh
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/termux_deploy.sh .github/workflows/ci.yml .github/workflows/repair-stop-failure-candidate.yml
          git commit -m "fix: remove untouched candidate when shutdown fails"
          git push origin HEAD:atomic-service-transitions-203

  rust:
    name: Rust validation
    needs: repair
    if: always() && (needs.repair.result == 'success' || needs.repair.result == 'skipped')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0 resolved 2026-07-10
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        # dtolnay/rust-toolchain@stable resolved 2026-06-26
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Verify Rust toolchain
        run: |
          test "$(rustc --version | awk '{print $2}')" = "1.88.0"
          test "$(cargo --version | awk '{print $2}')" = "1.88.0"
          rustfmt --version
          cargo clippy --version

      - name: Cache cargo registry and build outputs
        # Swatinem/rust-cache@v2 resolved 2026-06-26
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --workspace --all-targets --all-features

      - name: Termux deployment shell tests
        run: bash tests/termux_deploy_test.sh
