name: CI

on:
  push:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rust:
    name: Apply rustfmt
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt
      - name: Apply rustfmt and push
        run: |
          cargo fmt --all
          git add src
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Apply rustfmt" || exit 0
          git push origin HEAD:automation/platform-info-transport-final
