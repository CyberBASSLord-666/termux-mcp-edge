name: CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: replay-format-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust validation
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: create-directory-capability-grant-248
          fetch-depth: 0
          persist-credentials: true

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Verify Rust toolchain
        run: |
          test "$(rustc --version | awk '{print $2}')" = "1.88.0"
          test "$(cargo --version | awk '{print $2}')" = "1.88.0"
          rustfmt --version
          cargo clippy --version

      - name: Cache cargo registry and build outputs
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Apply canonical formatting
        run: |
          set -euo pipefail
          cargo fmt --all
          git diff --check

      - name: Clippy default posture
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy all features
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Tests default posture
        run: cargo test --workspace --all-targets

      - name: Tests all features
        run: cargo test --workspace --all-targets --all-features

      - name: Shell contract tests
        run: |
          bash tests/package_android_artifact_test.sh
          bash tests/termux_deploy_test.sh
          bash tests/termux_device_smoke_test.sh
          bash tests/termux_emulated_gate_test.sh
          bash tests/termux_release_validate_test.sh
          bash tests/setup_named_tunnel_test.sh
          bash -n scripts/termux_command_emulated_gate.sh
          jq -e '.type == "object" and .additionalProperties == false' docs/command-emulated-evidence-schema-v1.json >/dev/null

      - name: Publish validated formatting and restore permanent CI
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "create-directory-capability-grant-248"
          git fetch --no-tags origin main
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/config.rs src/directory_grant.rs src/directory_replay.rs src/lib.rs src/main.rs .github/workflows/ci.yml
          git diff --cached --check
          git commit -m "style: format durable replay ledger implementation"
          git push origin HEAD:create-directory-capability-grant-248
