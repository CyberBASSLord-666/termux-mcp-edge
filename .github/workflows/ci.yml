name: CI

on:
  push:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - "scripts/**"
      - "docs/*release-evidence-schema-v1.json"
      - "docs/emulated-release-evidence-schema-v*.json"
      - "docs/android-battery-emulated-evidence-schema-v*.json"
      - "docs/android-volume-emulated-evidence-schema-v*.json"
      - "docs/android-volume-control-emulated-evidence-schema-v*.json"
      - "docs/command-emulated-evidence-schema-v*.json"
      - "docs/release-observation-requirement-schema-v1.json"
      - "docs/release-observation-inheritance-schema-v1.json"
      - ".github/workflows/*"
  pull_request:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - "scripts/**"
      - "docs/*release-evidence-schema-v1.json"
      - "docs/emulated-release-evidence-schema-v*.json"
      - "docs/android-battery-emulated-evidence-schema-v*.json"
      - "docs/android-volume-emulated-evidence-schema-v*.json"
      - "docs/android-volume-control-emulated-evidence-schema-v*.json"
      - "docs/command-emulated-evidence-schema-v*.json"
      - "docs/release-observation-requirement-schema-v1.json"
      - "docs/release-observation-inheritance-schema-v1.json"
      - ".github/workflows/*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust validation
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        # actions/checkout@v7.0.0 resolved 2026-07-10
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Install pinned Rust toolchain
        # dtolnay/rust-toolchain@stable resolved 2026-06-26
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Verify Rust toolchain
        run: |
          test "$(rustc --version | awk '{print $2}')" = "1.88.0"
          test "$(cargo --version | awk '{print $2}')" = "1.88.0"
          rustfmt --version
          cargo clippy --version

      - name: Cache cargo registry and build outputs
        # Swatinem/rust-cache@v2 resolved 2026-06-26
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (default posture)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Clippy (all features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Tests (default posture)
        run: cargo test --workspace --all-targets

      - name: Tests (all features)
        run: cargo test --workspace --all-targets --all-features

      - name: Shell contract tests
        run: |
          bash tests/package_android_artifact_test.sh
          bash tests/termux_deploy_test.sh
          bash tests/termux_device_smoke_test.sh
          bash tests/termux_emulated_gate_test.sh
          bash tests/termux_release_validate_test.sh
          bash tests/setup_named_tunnel_test.sh
          bash -n scripts/termux_command_emulated_gate.sh
          jq -e '.type == "object" and .additionalProperties == false' \
            docs/command-emulated-evidence-schema-v2.json >/dev/null
