name: CI

on:
  push:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - "scripts/**"
      - "docs/*release-evidence-schema-v1.json"
      - "docs/android-battery-emulated-evidence-schema-v*.json"
      - "docs/android-volume-emulated-evidence-schema-v*.json"
      - "docs/command-emulated-evidence-schema-v*.json"
      - "docs/release-observation-requirement-schema-v1.json"
      - "docs/release-observation-inheritance-schema-v1.json"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - "scripts/**"
      - "docs/*release-evidence-schema-v1.json"
      - "docs/android-battery-emulated-evidence-schema-v*.json"
      - "docs/android-volume-emulated-evidence-schema-v*.json"
      - "docs/command-emulated-evidence-schema-v*.json"
      - "docs/release-observation-requirement-schema-v1.json"
      - "docs/release-observation-inheritance-schema-v1.json"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust validation
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0
          persist-credentials: true

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Verify Rust toolchain
        run: |
          test "$(rustc --version | awk '{print $2}')" = "1.88.0"
          test "$(cargo --version | awk '{print $2}')" = "1.88.0"
          rustfmt --version
          cargo clippy --version

      - name: Cache cargo registry and build outputs
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Apply staged directory grant transport and verifier
        id: apply
        continue-on-error: true
        if: github.event_name == 'pull_request' && github.head_ref == 'create-directory-capability-grant-248'
        run: |
          set +e
          (
            set -euo pipefail
            python3 -m py_compile .github/remediation/apply_directory_grant_verifier.py
            python3 -m py_compile .github/remediation/fix_directory_grant_verifier_generated.py
            python3 .github/remediation/apply_directory_grant_verifier.py
            python3 .github/remediation/fix_directory_grant_verifier_generated.py
            cargo fmt --all
            git diff --check
          ) 2>&1 | tee /tmp/apply-directory-grant-verifier.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish bounded applicator diagnostic
        if: steps.apply.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          {
            printf 'Directory-grant applicator diagnostic for `%s`:\n\n```text\n' "$SOURCE_SHA"
            tail -n 120 /tmp/apply-directory-grant-verifier.log | sed -E 's#/home/runner/work/[^ ]+#<workspace>#g'
            printf '```\n'
          } > /tmp/apply-diagnostic.md
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/apply-diagnostic.md

      - name: Enforce applicator result
        if: steps.apply.outputs.status != '0'
        run: exit 1

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy (default posture diagnostic)
        id: clippy_default
        continue-on-error: true
        env:
          CARGO_TERM_COLOR: never
        run: |
          set +e
          cargo clippy --workspace --all-targets -- -D warnings 2>&1 | tee /tmp/clippy-default.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish bounded default Clippy diagnostic
        if: steps.clippy_default.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          {
            printf 'Directory-grant verifier default Clippy diagnostic for `%s`:\n\n```text\n' "$SOURCE_SHA"
            tail -n 220 /tmp/clippy-default.log | sed -E 's#/home/runner/work/[^ ]+#<workspace>#g'
            printf '```\n'
          } > /tmp/clippy-default-diagnostic.md
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/clippy-default-diagnostic.md

      - name: Enforce default Clippy result
        if: steps.clippy_default.outputs.status != '0'
        run: exit 1

      - name: Clippy (all features diagnostic)
        id: clippy_all
        continue-on-error: true
        env:
          CARGO_TERM_COLOR: never
        run: |
          set +e
          cargo clippy --workspace --all-targets --all-features -- -D warnings 2>&1 | tee /tmp/clippy-all-features.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish bounded all-features Clippy diagnostic
        if: steps.clippy_all.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          {
            printf 'Directory-grant verifier all-features Clippy diagnostic for `%s`:\n\n```text\n' "$SOURCE_SHA"
            tail -n 220 /tmp/clippy-all-features.log | sed -E 's#/home/runner/work/[^ ]+#<workspace>#g'
            printf '```\n'
          } > /tmp/clippy-diagnostic.md
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/clippy-diagnostic.md

      - name: Enforce all-features Clippy result
        if: steps.clippy_all.outputs.status != '0'
        run: exit 1

      - name: Tests (default posture)
        run: cargo test --workspace --all-targets

      - name: Tests (all features diagnostic)
        id: tests_all
        continue-on-error: true
        env:
          CARGO_TERM_COLOR: never
        run: |
          set +e
          cargo test --workspace --all-targets --all-features 2>&1 | tee /tmp/tests-all-features.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Publish bounded test diagnostic
        if: steps.tests_all.outputs.status != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          {
            printf 'Directory-grant verifier all-features test diagnostic for `%s`:\n\n```text\n' "$SOURCE_SHA"
            tail -n 240 /tmp/tests-all-features.log | sed -E 's#/home/runner/work/[^ ]+#<workspace>#g'
            printf '```\n'
          } > /tmp/tests-diagnostic.md
          gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file /tmp/tests-diagnostic.md

      - name: Enforce all-features test result
        if: steps.tests_all.outputs.status != '0'
        run: exit 1

      - name: Shell contract tests
        run: |
          bash tests/package_android_artifact_test.sh
          bash tests/termux_deploy_test.sh
          bash tests/termux_device_smoke_test.sh
          bash tests/termux_emulated_gate_test.sh
          bash tests/termux_release_validate_test.sh
          bash tests/setup_named_tunnel_test.sh
          bash -n scripts/termux_command_emulated_gate.sh
          jq -e '.type == "object" and .additionalProperties == false' \
            docs/command-emulated-evidence-schema-v1.json >/dev/null

      - name: Publish validated directory grant verifier and restore CI
        if: github.event_name == 'pull_request' && github.head_ref == 'create-directory-capability-grant-248'
        env:
          EXPECTED_BRANCH: create-directory-capability-grant-248
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "$EXPECTED_BRANCH"
          git fetch --no-tags origin main
          rm .github/remediation/apply_directory_grant_verifier.py
          rm .github/remediation/fix_directory_grant_verifier_generated.py
          rm -rf .github/remediation/__pycache__
          rmdir .github/remediation
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock src/auth.rs src/config.rs src/directory_grant.rs src/lib.rs src/main.rs .github/remediation/apply_directory_grant_verifier.py .github/remediation/fix_directory_grant_verifier_generated.py .github/workflows/ci.yml
          git diff --cached --check
          git commit -m "feat: verify request-scoped directory capability grants"
          git push origin "HEAD:$EXPECTED_BRANCH"
