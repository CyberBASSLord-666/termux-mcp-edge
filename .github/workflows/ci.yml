name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  rust:
    name: Rust validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # actions/checkout@v4 resolved 2026-06-26
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Rust toolchain
        # dtolnay/rust-toolchain@stable resolved 2026-06-26
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build outputs
        # Swatinem/rust-cache@v2 resolved 2026-06-26
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Capture rmcp API diagnostics
        run: |
          cargo fetch
          rmcp_dir="$(find "${CARGO_HOME:-$HOME/.cargo}/registry/src" -type d -path "*/rmcp-0.1.5" | head -n 1)"
          mkdir -p rmcp-diagnostics
          cp "$rmcp_dir/src/handler/server/tool.rs" rmcp-diagnostics/tool.rs
          grep -R "Parameters" "$rmcp_dir/src" > rmcp-diagnostics/parameters.txt || true
          grep -R "IntoCallToolResult" "$rmcp_dir/src" > rmcp-diagnostics/into-call-tool-result.txt || true
          find "$rmcp_dir" -maxdepth 3 -type f | sort > rmcp-diagnostics/files.txt
        continue-on-error: true

      - name: Upload rmcp API diagnostics
        if: always()
        # actions/upload-artifact@v4 resolved 2026-06-26
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rmcp-api-diagnostics
          path: rmcp-diagnostics
          if-no-files-found: ignore

      - name: Capture rustfmt diagnostics
        run: cargo fmt --all -- --check 2>&1 | tee rustfmt.log
        continue-on-error: true

      - name: Upload rustfmt diagnostics
        if: always()
        # actions/upload-artifact@v4 resolved 2026-06-26
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: rustfmt-diagnostics
          path: rustfmt.log
          if-no-files-found: ignore

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Capture clippy diagnostics
        run: cargo clippy --all-targets --all-features -- -D warnings 2>&1 | tee clippy.log
        continue-on-error: true

      - name: Upload clippy diagnostics
        if: always()
        # actions/upload-artifact@v4 resolved 2026-06-26
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: clippy-diagnostics
          path: clippy.log
          if-no-files-found: ignore

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all-features
