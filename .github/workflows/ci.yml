name: CI

on:
  push:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - "examples/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "benches/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  lockfile:
    name: Generate Cargo.lock
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Generate and commit Cargo.lock
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git clone --branch automation/cargo-lock-reproducibility --single-branch "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" repo
          cd repo
          rustup default stable
          cargo generate-lockfile
          git add Cargo.lock
          if git diff --cached --quiet; then
            echo "No lockfile changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add reproducible Cargo.lock"
          git push origin HEAD:automation/cargo-lock-reproducibility
