name: CI

on:
  pull_request:
    branches: [ main ]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - ".github/remediation/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: replay-shell-diagnostic-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust validation
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: create-directory-capability-grant-248
          fetch-depth: 0
          persist-credentials: true

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: 1.88.0
          components: rustfmt, clippy

      - name: Cache cargo registry and build outputs
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32

      - name: Apply guarded owner-only fixture repair
        run: |
          set -euo pipefail
          python3 -m py_compile .github/remediation/fix_replay_clippy.py
          python3 .github/remediation/fix_replay_clippy.py
          cargo fmt --all
          git diff --check

      - name: Verify Rust matrices
        run: |
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          cargo test --workspace --all-targets
          cargo test --workspace --all-targets --all-features

      - name: Shell contract diagnostic
        id: shell
        continue-on-error: true
        run: |
          set +e
          (
            set -euo pipefail
            for test_script in \
              tests/package_android_artifact_test.sh \
              tests/termux_deploy_test.sh \
              tests/termux_device_smoke_test.sh \
              tests/termux_emulated_gate_test.sh \
              tests/termux_release_validate_test.sh \
              tests/setup_named_tunnel_test.sh
            do
              printf '\n===== %s =====\n' "$test_script"
              bash "$test_script"
            done
            bash -n scripts/termux_command_emulated_gate.sh
            jq -e '.type == "object" and .additionalProperties == false' docs/command-emulated-evidence-schema-v1.json >/dev/null
          ) 2>&1 | tee /tmp/replay-shell.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Persist source and bounded shell diagnostic
        if: always() && steps.shell.outcome != 'skipped'
        run: |
          set -euo pipefail
          test "$(git branch --show-current)" = "create-directory-capability-grant-248"
          tail -n 320 /tmp/replay-shell.log > .github/replay-shell-diagnostic.txt
          rm -f .github/replay-test-diagnostic.txt .github/replay-clippy-diagnostic.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A src/directory_replay.rs .github/replay-shell-diagnostic.txt .github/replay-test-diagnostic.txt .github/replay-clippy-diagnostic.txt
          git diff --cached --check
          git commit -m "diagnostic: persist replay shell contract output"
          git push origin HEAD:create-directory-capability-grant-248

      - name: Enforce shell contracts
        if: steps.shell.outputs.status != '0'
        run: exit 1
