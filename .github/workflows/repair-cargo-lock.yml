name: Repair Cargo lockfile

on:
  push:
    branches:
      - cargo-surface-218
    paths:
      - .github/workflows/repair-cargo-lock.yml

permissions:
  contents: write

concurrency:
  group: repair-cargo-lock-${{ github.ref }}
  cancel-in-progress: false

jobs:
  repair:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: cargo-surface-218
          persist-credentials: true
          fetch-depth: 0

      - name: Install pinned Rust toolchain
        run: rustup toolchain install 1.88.0 --profile minimal

      - name: Regenerate lockfile
        run: cargo +1.88.0 generate-lockfile

      - name: Validate locked metadata
        run: cargo +1.88.0 metadata --locked --format-version 1 >/dev/null

      - name: Remove temporary workflow
        run: rm -- .github/workflows/repair-cargo-lock.yml

      - name: Commit repair
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock .github/workflows/repair-cargo-lock.yml
          git diff --cached --check
          git commit -m "fix: regenerate lockfile after Cargo feature minimization"
          git push origin HEAD:cargo-surface-218
