name: Stage Release Assets

on:
  workflow_dispatch:
    inputs:
      expected_commit:
        description: Exact lowercase 40-character current main commit
        required: true
        type: string
      version:
        description: Exact Cargo package version
        required: true
        type: string
      android_run_id:
        description: First-attempt successful Android Cross Compile push run
        required: true
        type: string
      physical_bundle_sha256:
        description: SHA-256 of the gzip-compressed physical evidence bundle
        required: true
        type: string
      physical_bundle_gzip_base64:
        description: Single-line base64 of the sanitized two-file physical evidence bundle
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: release-staging-${{ inputs.expected_commit }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Verify exact release inputs
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    outputs:
      artifact_ids: ${{ steps.upstream.outputs.artifact_ids }}
    steps:
      - name: Checkout dispatch main candidate
        # actions/checkout@v7.0.0 resolved 2026-07-10
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Validate dispatch and immutable source
        env:
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_VERSION: ${{ inputs.version }}
          ANDROID_RUN_ID: ${{ inputs.android_run_id }}
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          PHYSICAL_BUNDLE_SHA256: ${{ inputs.physical_bundle_sha256 }}
        run: |
          set -euo pipefail
          umask 077
          jq -e '
            .inputs.physical_bundle_gzip_base64 as $value
            | ($value | type == "string")
            and (($value | length) > 0 and ($value | length) <= 60000)
            and ($value | test("^[A-Za-z0-9+/]+={0,2}$"))
            and (($value | length) % 4 == 0)
          ' "$GITHUB_EVENT_PATH" >/dev/null
          PHYSICAL_BUNDLE_GZIP_BASE64="$(jq -er '.inputs.physical_bundle_gzip_base64' "$GITHUB_EVENT_PATH")"
          [[ "$DISPATCH_REF" == refs/heads/main ]]
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$DISPATCH_SHA" == "$EXPECTED_COMMIT" ]]
          [[ "$EXPECTED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$ANDROID_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$PHYSICAL_BUNDLE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          ((${#PHYSICAL_BUNDLE_GZIP_BASE64} > 0))
          ((${#PHYSICAL_BUNDLE_GZIP_BASE64} <= 60000))
          [[ "$PHYSICAL_BUNDLE_GZIP_BASE64" =~ ^[A-Za-z0-9+/]+={0,2}$ ]]
          ((${#PHYSICAL_BUNDLE_GZIP_BASE64} % 4 == 0))
          printf '::add-mask::%s\n' "$PHYSICAL_BUNDLE_GZIP_BASE64"
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          test -z "$(git status --short)"
          test "$(sed -n '0,/^version = /s/^version = "\([^"]*\)"/\1/p' Cargo.toml)" = "$EXPECTED_VERSION"

      - name: Verify upstream run and exact artifact set
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          ANDROID_RUN_ID: ${{ inputs.android_run_id }}
        run: |
          set -euo pipefail
          umask 077
          api_root="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY"
          api_get() {
            curl --fail-with-body --silent --show-error \
              --connect-timeout 10 --max-time 30 \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "$1"
          }
          api_get "$api_root/git/ref/heads/main" >main-ref.json
          jq -e --arg sha "$EXPECTED_COMMIT" \
            '.object.type == "commit" and .object.sha == $sha' main-ref.json >/dev/null

          api_get "$api_root/actions/runs/$ANDROID_RUN_ID" >android-run.json
          jq -e \
            --arg repository "$GITHUB_REPOSITORY" \
            --arg sha "$EXPECTED_COMMIT" \
            --argjson run_id "$ANDROID_RUN_ID" '
              .id == $run_id
              and .name == "Android Cross Compile"
              and .path == ".github/workflows/android-cross-compile.yml"
              and .event == "push"
              and .head_branch == "main"
              and .head_sha == $sha
              and .status == "completed"
              and .conclusion == "success"
              and .run_attempt == 1
              and .repository.full_name == $repository
              and .head_repository.full_name == $repository
            ' android-run.json >/dev/null

          api_get "$api_root/actions/workflows/android-cross-compile.yml/runs?branch=main&event=push&head_sha=$EXPECTED_COMMIT&per_page=100" >android-runs.json
          jq -e --argjson run_id "$ANDROID_RUN_ID" '
            (.workflow_runs | length) >= 1
            and .workflow_runs[0].id == $run_id
            and .workflow_runs[0].run_attempt == 1
            and .workflow_runs[0].status == "completed"
            and .workflow_runs[0].conclusion == "success"
          ' android-runs.json >/dev/null

          api_get "$api_root/actions/runs/$ANDROID_RUN_ID/artifacts?per_page=100" >artifacts.json
          expected_names='[
            "termux-mcp-emulated-evidence",
            "termux-mcp-server-aarch64-linux-android-android-battery-status",
            "termux-mcp-server-aarch64-linux-android-android-volume-control",
            "termux-mcp-server-aarch64-linux-android-android-volume-status",
            "termux-mcp-server-aarch64-linux-android-command-execution",
            "termux-mcp-server-aarch64-linux-android-default",
            "termux-mcp-server-aarch64-linux-android-full-suite",
            "termux-mcp-server-aarch64-linux-android-mcp-runtime"
          ]'
          jq -e --argjson expected "$expected_names" '
            .total_count == 8
            and ([.artifacts[].name] | sort) == ($expected | sort)
            and ([.artifacts[].id] | unique | length) == 8
            and all(.artifacts[];
              (.expired == false)
              and (.size_in_bytes >= 1)
              and (.digest | test("^sha256:[0-9a-f]{64}$"))
            )
          ' artifacts.json >/dev/null
          artifact_ids="$(jq -r '[.artifacts | sort_by(.name)[] | (.id | tostring)] | join(",")' artifacts.json)"
          [[ "$artifact_ids" =~ ^[1-9][0-9]*(,[1-9][0-9]*){7}$ ]]
          printf 'artifact_ids=%s\n' "$artifact_ids" >>"$GITHUB_OUTPUT"

      - name: Download exact upstream artifacts by ID
        # actions/download-artifact@v8.0.1 resolved 2026-07-19
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          artifact-ids: ${{ steps.upstream.outputs.artifact_ids }}
          path: upstream
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.android_run_id }}
          digest-mismatch: error

      - name: Decode sanitized physical evidence
        env:
          PHYSICAL_BUNDLE_SHA256: ${{ inputs.physical_bundle_sha256 }}
        run: |
          set -euo pipefail
          umask 077
          jq -e '
            .inputs.physical_bundle_gzip_base64 as $value
            | ($value | type == "string")
            and (($value | length) > 0 and ($value | length) <= 60000)
            and ($value | test("^[A-Za-z0-9+/]+={0,2}$"))
            and (($value | length) % 4 == 0)
          ' "$GITHUB_EVENT_PATH" >/dev/null
          PHYSICAL_BUNDLE_GZIP_BASE64="$(jq -er '.inputs.physical_bundle_gzip_base64' "$GITHUB_EVENT_PATH")"
          ((${#PHYSICAL_BUNDLE_GZIP_BASE64} > 0))
          ((${#PHYSICAL_BUNDLE_GZIP_BASE64} <= 60000))
          [[ "$PHYSICAL_BUNDLE_GZIP_BASE64" =~ ^[A-Za-z0-9+/]+={0,2}$ ]]
          ((${#PHYSICAL_BUNDLE_GZIP_BASE64} % 4 == 0))
          printf '::add-mask::%s\n' "$PHYSICAL_BUNDLE_GZIP_BASE64"
          archive="$RUNNER_TEMP/physical-evidence.tar.gz"
          output="$RUNNER_TEMP/physical-evidence"
          mkdir -m 700 "$output"
          printf '%s' "$PHYSICAL_BUNDLE_GZIP_BASE64" | base64 --decode >"$archive"
          test "$(sha256sum "$archive" | awk '{print $1}')" = "$PHYSICAL_BUNDLE_SHA256"
          gzip -t "$archive"
          ARCHIVE="$archive" OUTPUT="$output" python3 - <<'PY'
          import os
          import pathlib
          import tarfile

          archive = pathlib.Path(os.environ["ARCHIVE"])
          output = pathlib.Path(os.environ["OUTPUT"])
          expected = ["physical-qualification-v1.json", "release-validator-v11.json"]
          with tarfile.open(archive, "r:gz") as source:
              members = source.getmembers()
              if sorted(member.name for member in members) != expected:
                  raise SystemExit("physical evidence bundle members are not exact")
              for member in members:
                  if not member.isfile() or member.size < 2 or member.size > 4_194_304:
                      raise SystemExit("physical evidence bundle contains an invalid member")
                  handle = source.extractfile(member)
                  if handle is None:
                      raise SystemExit("physical evidence member could not be read")
                  target = output / member.name
                  target.write_bytes(handle.read())
                  target.chmod(0o600)
          PY

      - name: Verify companion runs and assemble throwaway stage
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_VERSION: ${{ inputs.version }}
          ANDROID_RUN_ID: ${{ inputs.android_run_id }}
        run: |
          set -euo pipefail
          umask 077
          evidence_dir="upstream/termux-mcp-emulated-evidence"
          aggregate="$evidence_dir/termux-emulated-evidence.json"
          test -f "$aggregate"
          test ! -L "$aggregate"
          ci_run_id="$(jq -r .candidate.ciRunId "$aggregate")"
          security_run_id="$(jq -r .candidate.securityRunId "$aggregate")"
          test "$(jq -r .candidate.androidRunId "$aggregate")" = "$ANDROID_RUN_ID"
          api_root="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY"
          api_get() {
            curl --fail-with-body --silent --show-error \
              --connect-timeout 10 --max-time 30 \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "$1"
          }
          for contract in "CI|ci.yml|$ci_run_id" "Security|security.yml|$security_run_id"; do
            IFS='|' read -r expected_name workflow_file run_id <<<"$contract"
            [[ "$run_id" =~ ^[1-9][0-9]*$ ]]
            api_get "$api_root/actions/runs/$run_id" >"$RUNNER_TEMP/$workflow_file.run.json"
            jq -e \
              --arg name "$expected_name" --arg path ".github/workflows/$workflow_file" \
              --arg repository "$GITHUB_REPOSITORY" --arg sha "$EXPECTED_COMMIT" \
              --argjson run_id "$run_id" '
                .id == $run_id and .name == $name and .path == $path
                and .event == "push" and .head_branch == "main" and .head_sha == $sha
                and .status == "completed" and .conclusion == "success" and .run_attempt == 1
                and .repository.full_name == $repository and .head_repository.full_name == $repository
              ' "$RUNNER_TEMP/$workflow_file.run.json" >/dev/null
            api_get "$api_root/actions/workflows/$workflow_file/runs?branch=main&event=push&head_sha=$EXPECTED_COMMIT&per_page=100" >"$RUNNER_TEMP/$workflow_file.runs.json"
            jq -e --argjson run_id "$run_id" '
              (.workflow_runs | length) >= 1 and .workflow_runs[0].id == $run_id
              and .workflow_runs[0].run_attempt == 1
              and .workflow_runs[0].status == "completed"
              and .workflow_runs[0].conclusion == "success"
            ' "$RUNNER_TEMP/$workflow_file.runs.json" >/dev/null
          done
          chmod 700 scripts/stage_release_assets.sh
          preflight_output="$RUNNER_TEMP/termux-mcp-server-v${EXPECTED_VERSION}-release-stage-${EXPECTED_COMMIT:0:12}.tar"
          scripts/stage_release_assets.sh \
            --default-dir upstream/termux-mcp-server-aarch64-linux-android-default \
            --mcp-runtime-dir upstream/termux-mcp-server-aarch64-linux-android-mcp-runtime \
            --android-battery-status-dir upstream/termux-mcp-server-aarch64-linux-android-android-battery-status \
            --android-volume-status-dir upstream/termux-mcp-server-aarch64-linux-android-android-volume-status \
            --android-volume-control-dir upstream/termux-mcp-server-aarch64-linux-android-android-volume-control \
            --command-execution-dir upstream/termux-mcp-server-aarch64-linux-android-command-execution \
            --full-suite-dir upstream/termux-mcp-server-aarch64-linux-android-full-suite \
            --emulated-evidence-dir "$evidence_dir" \
            --validator-evidence "$RUNNER_TEMP/physical-evidence/release-validator-v11.json" \
            --physical-qualification "$RUNNER_TEMP/physical-evidence/physical-qualification-v1.json" \
            --license LICENSE \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$EXPECTED_COMMIT" \
            --version "$EXPECTED_VERSION" \
            --ci-run-id "$ci_run_id" \
            --security-run-id "$security_run_id" \
            --android-run-id "$ANDROID_RUN_ID" \
            --output "$preflight_output"
          test -f "$preflight_output"
          test ! -L "$preflight_output"
          tar -tf "$preflight_output" >/dev/null
          rm -f -- "$preflight_output"

  stage:
    name: Assemble protected pre-release stage
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: release-qualification
      deployment: false
    steps:
      - name: Require pre-created protected environment
        env:
          ENVIRONMENT_GUARD: ${{ vars.RELEASE_QUALIFICATION_PROTECTED }}
        run: test "$ENVIRONMENT_GUARD" = required-reviewer-main-only-v1

      - name: Checkout dispatch main candidate after approval
        # actions/checkout@v7.0.0 resolved 2026-07-10
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Revalidate source and upstream run after approval
        id: upstream
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_VERSION: ${{ inputs.version }}
          ANDROID_RUN_ID: ${{ inputs.android_run_id }}
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          EXPECTED_ARTIFACT_IDS: ${{ needs.preflight.outputs.artifact_ids }}
          PHYSICAL_BUNDLE_SHA256: ${{ inputs.physical_bundle_sha256 }}
        run: |
          set -euo pipefail
          umask 077
          jq -e '
            .inputs.physical_bundle_gzip_base64 as $value
            | ($value | type == "string")
            and (($value | length) > 0 and ($value | length) <= 60000)
            and ($value | test("^[A-Za-z0-9+/]+={0,2}$"))
            and (($value | length) % 4 == 0)
          ' "$GITHUB_EVENT_PATH" >/dev/null
          PHYSICAL_BUNDLE_GZIP_BASE64="$(jq -er '.inputs.physical_bundle_gzip_base64' "$GITHUB_EVENT_PATH")"
          [[ "$DISPATCH_REF" == refs/heads/main ]]
          [[ "$EXPECTED_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$DISPATCH_SHA" == "$EXPECTED_COMMIT" ]]
          [[ "$EXPECTED_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$ANDROID_RUN_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$PHYSICAL_BUNDLE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          ((${#PHYSICAL_BUNDLE_GZIP_BASE64} > 0))
          ((${#PHYSICAL_BUNDLE_GZIP_BASE64} <= 60000))
          [[ "$PHYSICAL_BUNDLE_GZIP_BASE64" =~ ^[A-Za-z0-9+/]+={0,2}$ ]]
          ((${#PHYSICAL_BUNDLE_GZIP_BASE64} % 4 == 0))
          printf '::add-mask::%s\n' "$PHYSICAL_BUNDLE_GZIP_BASE64"
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          test -z "$(git status --short)"
          test "$(sed -n '0,/^version = /s/^version = "\([^"]*\)"/\1/p' Cargo.toml)" = "$EXPECTED_VERSION"
          api_root="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY"
          api_get() {
            curl --fail-with-body --silent --show-error \
              --connect-timeout 10 --max-time 30 \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "$1"
          }
          api_get "$api_root/git/ref/heads/main" >main-ref.json
          jq -e --arg sha "$EXPECTED_COMMIT" '.object.type == "commit" and .object.sha == $sha' main-ref.json >/dev/null
          api_get "$api_root/actions/runs/$ANDROID_RUN_ID" >android-run.json
          jq -e \
            --arg repository "$GITHUB_REPOSITORY" --arg sha "$EXPECTED_COMMIT" \
            --argjson run_id "$ANDROID_RUN_ID" '
              .id == $run_id and .name == "Android Cross Compile"
              and .path == ".github/workflows/android-cross-compile.yml"
              and .event == "push" and .head_branch == "main" and .head_sha == $sha
              and .status == "completed" and .conclusion == "success" and .run_attempt == 1
              and .repository.full_name == $repository and .head_repository.full_name == $repository
            ' android-run.json >/dev/null
          api_get "$api_root/actions/workflows/android-cross-compile.yml/runs?branch=main&event=push&head_sha=$EXPECTED_COMMIT&per_page=100" >android-runs.json
          jq -e --argjson run_id "$ANDROID_RUN_ID" '
            (.workflow_runs | length) >= 1 and .workflow_runs[0].id == $run_id
            and .workflow_runs[0].run_attempt == 1
            and .workflow_runs[0].status == "completed"
            and .workflow_runs[0].conclusion == "success"
          ' android-runs.json >/dev/null
          api_get "$api_root/actions/runs/$ANDROID_RUN_ID/artifacts?per_page=100" >artifacts.json
          expected_names='[
            "termux-mcp-emulated-evidence",
            "termux-mcp-server-aarch64-linux-android-android-battery-status",
            "termux-mcp-server-aarch64-linux-android-android-volume-control",
            "termux-mcp-server-aarch64-linux-android-android-volume-status",
            "termux-mcp-server-aarch64-linux-android-command-execution",
            "termux-mcp-server-aarch64-linux-android-default",
            "termux-mcp-server-aarch64-linux-android-full-suite",
            "termux-mcp-server-aarch64-linux-android-mcp-runtime"
          ]'
          jq -e --argjson expected "$expected_names" '
            .total_count == 8
            and ([.artifacts[].name] | sort) == ($expected | sort)
            and ([.artifacts[].id] | unique | length) == 8
            and all(.artifacts[];
              (.expired == false) and (.size_in_bytes >= 1)
              and (.digest | test("^sha256:[0-9a-f]{64}$"))
            )
          ' artifacts.json >/dev/null
          artifact_ids="$(jq -r '[.artifacts | sort_by(.name)[] | (.id | tostring)] | join(",")' artifacts.json)"
          test "$artifact_ids" = "$EXPECTED_ARTIFACT_IDS"
          printf 'artifact_ids=%s\n' "$artifact_ids" >>"$GITHUB_OUTPUT"

      - name: Re-download exact upstream artifacts by ID
        # actions/download-artifact@v8.0.1 resolved 2026-07-19
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          artifact-ids: ${{ steps.upstream.outputs.artifact_ids }}
          path: upstream
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.android_run_id }}
          digest-mismatch: error

      - name: Re-decode sanitized physical evidence
        env:
          PHYSICAL_BUNDLE_SHA256: ${{ inputs.physical_bundle_sha256 }}
        run: |
          set -euo pipefail
          umask 077
          jq -e '
            .inputs.physical_bundle_gzip_base64 as $value
            | ($value | type == "string")
            and (($value | length) > 0 and ($value | length) <= 60000)
            and ($value | test("^[A-Za-z0-9+/]+={0,2}$"))
            and (($value | length) % 4 == 0)
          ' "$GITHUB_EVENT_PATH" >/dev/null
          PHYSICAL_BUNDLE_GZIP_BASE64="$(jq -er '.inputs.physical_bundle_gzip_base64' "$GITHUB_EVENT_PATH")"
          ((${#PHYSICAL_BUNDLE_GZIP_BASE64} > 0))
          ((${#PHYSICAL_BUNDLE_GZIP_BASE64} <= 60000))
          [[ "$PHYSICAL_BUNDLE_GZIP_BASE64" =~ ^[A-Za-z0-9+/]+={0,2}$ ]]
          ((${#PHYSICAL_BUNDLE_GZIP_BASE64} % 4 == 0))
          printf '::add-mask::%s\n' "$PHYSICAL_BUNDLE_GZIP_BASE64"
          archive="$RUNNER_TEMP/physical-evidence.tar.gz"
          output="$RUNNER_TEMP/physical-evidence"
          mkdir -m 700 "$output"
          printf '%s' "$PHYSICAL_BUNDLE_GZIP_BASE64" | base64 --decode >"$archive"
          test "$(sha256sum "$archive" | awk '{print $1}')" = "$PHYSICAL_BUNDLE_SHA256"
          gzip -t "$archive"
          ARCHIVE="$archive" OUTPUT="$output" python3 - <<'PY'
          import os
          import pathlib
          import tarfile

          archive = pathlib.Path(os.environ["ARCHIVE"])
          output = pathlib.Path(os.environ["OUTPUT"])
          expected = ["physical-qualification-v1.json", "release-validator-v11.json"]
          with tarfile.open(archive, "r:gz") as source:
              members = source.getmembers()
              if sorted(member.name for member in members) != expected:
                  raise SystemExit("physical evidence bundle members are not exact")
              for member in members:
                  if not member.isfile() or member.size < 2 or member.size > 4_194_304:
                      raise SystemExit("physical evidence bundle contains an invalid member")
                  handle = source.extractfile(member)
                  if handle is None:
                      raise SystemExit("physical evidence member could not be read")
                  target = output / member.name
                  target.write_bytes(handle.read())
                  target.chmod(0o600)
          PY

      - name: Repeat evidence checks and assemble deterministic stage
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          EXPECTED_VERSION: ${{ inputs.version }}
          ANDROID_RUN_ID: ${{ inputs.android_run_id }}
        run: |
          set -euo pipefail
          umask 077
          evidence_dir="upstream/termux-mcp-emulated-evidence"
          aggregate="$evidence_dir/termux-emulated-evidence.json"
          test -f "$aggregate"
          test ! -L "$aggregate"
          ci_run_id="$(jq -r .candidate.ciRunId "$aggregate")"
          security_run_id="$(jq -r .candidate.securityRunId "$aggregate")"
          test "$(jq -r .candidate.androidRunId "$aggregate")" = "$ANDROID_RUN_ID"
          api_root="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY"
          api_get() {
            curl --fail-with-body --silent --show-error \
              --connect-timeout 10 --max-time 30 \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "$1"
          }
          for contract in "CI|ci.yml|$ci_run_id" "Security|security.yml|$security_run_id"; do
            IFS='|' read -r expected_name workflow_file run_id <<<"$contract"
            [[ "$run_id" =~ ^[1-9][0-9]*$ ]]
            api_get "$api_root/actions/runs/$run_id" >"$RUNNER_TEMP/$workflow_file.run.json"
            jq -e \
              --arg name "$expected_name" --arg path ".github/workflows/$workflow_file" \
              --arg repository "$GITHUB_REPOSITORY" --arg sha "$EXPECTED_COMMIT" \
              --argjson run_id "$run_id" '
                .id == $run_id and .name == $name and .path == $path
                and .event == "push" and .head_branch == "main" and .head_sha == $sha
                and .status == "completed" and .conclusion == "success" and .run_attempt == 1
                and .repository.full_name == $repository and .head_repository.full_name == $repository
              ' "$RUNNER_TEMP/$workflow_file.run.json" >/dev/null
            api_get "$api_root/actions/workflows/$workflow_file/runs?branch=main&event=push&head_sha=$EXPECTED_COMMIT&per_page=100" >"$RUNNER_TEMP/$workflow_file.runs.json"
            jq -e --argjson run_id "$run_id" '
              (.workflow_runs | length) >= 1 and .workflow_runs[0].id == $run_id
              and .workflow_runs[0].run_attempt == 1
              and .workflow_runs[0].status == "completed"
              and .workflow_runs[0].conclusion == "success"
            ' "$RUNNER_TEMP/$workflow_file.runs.json" >/dev/null
          done
          printf 'CI_RUN_ID=%s\n' "$ci_run_id" >>"$GITHUB_ENV"
          printf 'SECURITY_RUN_ID=%s\n' "$security_run_id" >>"$GITHUB_ENV"
          output_dir="$RUNNER_TEMP/release-stage"
          mkdir -m 700 "$output_dir"
          output="$output_dir/termux-mcp-server-v${EXPECTED_VERSION}-release-stage-${EXPECTED_COMMIT:0:12}.tar"
          chmod 700 scripts/stage_release_assets.sh
          scripts/stage_release_assets.sh \
            --default-dir upstream/termux-mcp-server-aarch64-linux-android-default \
            --mcp-runtime-dir upstream/termux-mcp-server-aarch64-linux-android-mcp-runtime \
            --android-battery-status-dir upstream/termux-mcp-server-aarch64-linux-android-android-battery-status \
            --android-volume-status-dir upstream/termux-mcp-server-aarch64-linux-android-android-volume-status \
            --android-volume-control-dir upstream/termux-mcp-server-aarch64-linux-android-android-volume-control \
            --command-execution-dir upstream/termux-mcp-server-aarch64-linux-android-command-execution \
            --full-suite-dir upstream/termux-mcp-server-aarch64-linux-android-full-suite \
            --emulated-evidence-dir "$evidence_dir" \
            --validator-evidence "$RUNNER_TEMP/physical-evidence/release-validator-v11.json" \
            --physical-qualification "$RUNNER_TEMP/physical-evidence/physical-qualification-v1.json" \
            --license LICENSE \
            --repository "$GITHUB_REPOSITORY" \
            --commit "$EXPECTED_COMMIT" \
            --version "$EXPECTED_VERSION" \
            --ci-run-id "$ci_run_id" \
            --security-run-id "$security_run_id" \
            --android-run-id "$ANDROID_RUN_ID" \
            --output "$output"
          test -f "$output"
          test ! -L "$output"
          printf 'STAGED_TAR=%s\n' "$output" >>"$GITHUB_ENV"
          printf 'STAGED_TAR_SHA256=%s\n' "$(sha256sum "$output" | awk '{print $1}')" >>"$GITHUB_ENV"

      - name: Final upstream state and current-main check before staging upload
        env:
          GH_TOKEN: ${{ github.token }}
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          ANDROID_RUN_ID: ${{ inputs.android_run_id }}
          EXPECTED_ARTIFACT_IDS: ${{ steps.upstream.outputs.artifact_ids }}
        run: |
          set -euo pipefail
          api_root="$GITHUB_API_URL/repos/$GITHUB_REPOSITORY"
          api_get() {
            curl --fail-with-body --silent --show-error \
              --connect-timeout 10 --max-time 30 \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "$1"
          }
          for contract in \
            "CI|ci.yml|$CI_RUN_ID" \
            "Security|security.yml|$SECURITY_RUN_ID" \
            "Android Cross Compile|android-cross-compile.yml|$ANDROID_RUN_ID"
          do
            IFS='|' read -r expected_name workflow_file run_id <<<"$contract"
            [[ "$run_id" =~ ^[1-9][0-9]*$ ]]
            api_get "$api_root/actions/runs/$run_id" >"$RUNNER_TEMP/final-run-$run_id.json"
            jq -e \
              --arg name "$expected_name" --arg path ".github/workflows/$workflow_file" \
              --arg repository "$GITHUB_REPOSITORY" --arg sha "$EXPECTED_COMMIT" \
              --argjson run_id "$run_id" '
                .id == $run_id
                and .name == $name and .path == $path
                and .event == "push" and .head_branch == "main" and .head_sha == $sha
                and .status == "completed" and .conclusion == "success" and .run_attempt == 1
                and .repository.full_name == $repository and .head_repository.full_name == $repository
              ' "$RUNNER_TEMP/final-run-$run_id.json" >/dev/null
            api_get "$api_root/actions/workflows/$workflow_file/runs?branch=main&event=push&head_sha=$EXPECTED_COMMIT&per_page=100" \
              >"$RUNNER_TEMP/final-$workflow_file-runs.json"
            jq -e --argjson run_id "$run_id" '
              (.workflow_runs | length) >= 1 and .workflow_runs[0].id == $run_id
              and .workflow_runs[0].run_attempt == 1
              and .workflow_runs[0].status == "completed"
              and .workflow_runs[0].conclusion == "success"
            ' "$RUNNER_TEMP/final-$workflow_file-runs.json" >/dev/null
          done
          api_get "$api_root/actions/runs/$ANDROID_RUN_ID/artifacts?per_page=100" >"$RUNNER_TEMP/final-artifacts.json"
          jq -e '
            .total_count == 8
            and ([.artifacts[].id] | unique | length) == 8
            and all(.artifacts[];
              (.expired == false) and (.size_in_bytes >= 1)
              and (.digest | test("^sha256:[0-9a-f]{64}$"))
            )
          ' "$RUNNER_TEMP/final-artifacts.json" >/dev/null
          final_artifact_ids="$(jq -r '[.artifacts | sort_by(.name)[] | (.id | tostring)] | join(",")' "$RUNNER_TEMP/final-artifacts.json")"
          test "$final_artifact_ids" = "$EXPECTED_ARTIFACT_IDS"
          main_sha="$(api_get "$api_root/git/ref/heads/main" | jq -r .object.sha)"
          test "$main_sha" = "$EXPECTED_COMMIT"
          test "$(git rev-parse HEAD)" = "$EXPECTED_COMMIT"
          test -f "$STAGED_TAR"
          test "$(sha256sum "$STAGED_TAR" | awk '{print $1}')" = "$STAGED_TAR_SHA256"

      - name: Upload staged tar without re-archiving
        id: staged
        # actions/upload-artifact@v7.0.1 resolved 2026-07-10
        # With archive:false, the action derives the artifact name from the
        # single uploaded file basename and ignores the name input.
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          path: ${{ env.STAGED_TAR }}
          archive: false
          if-no-files-found: error
          retention-days: 30

      - name: Record staging identity
        env:
          EXPECTED_COMMIT: ${{ inputs.expected_commit }}
          ANDROID_RUN_ID: ${{ inputs.android_run_id }}
          STAGED_ARTIFACT_ID: ${{ steps.staged.outputs.artifact-id }}
          STAGED_ARTIFACT_DIGEST: ${{ steps.staged.outputs.artifact-digest }}
          STAGED_ARTIFACT_URL: ${{ steps.staged.outputs.artifact-url }}
        run: |
          set -euo pipefail
          [[ "$STAGED_ARTIFACT_ID" =~ ^[1-9][0-9]*$ ]]
          [[ "$STAGED_ARTIFACT_DIGEST" =~ ^[0-9a-f]{64}$ ]]
          test "$STAGED_ARTIFACT_DIGEST" = "$STAGED_TAR_SHA256"
          {
            printf '## Protected pre-release stage created\n\n'
            printf -- '- Publication state: `staged_not_released`\n'
            printf -- '- Release eligible: `false`\n'
            printf -- '- Source commit: `%s`\n' "$EXPECTED_COMMIT"
            printf -- '- Android run: `%s`\n' "$ANDROID_RUN_ID"
            printf -- '- Tar SHA-256: `%s`\n' "$STAGED_TAR_SHA256"
            printf -- '- Actions artifact ID: `%s`\n' "$STAGED_ARTIFACT_ID"
            printf -- '- Actions server digest: `%s`\n' "$STAGED_ARTIFACT_DIGEST"
            printf -- '- Actions artifact URL: %s\n' "$STAGED_ARTIFACT_URL"
            printf '\nThis workflow did not create a tag or GitHub Release.\n'
          } >>"$GITHUB_STEP_SUMMARY"
