name: Repair stop-failure cleanup

on:
  push:
    branches:
      - atomic-service-transitions-203
    paths:
      - .github/workflows/repair-stop-failure-cleanup-216.yml

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: atomic-service-transitions-203
          fetch-depth: 0
      - name: Apply focused repair
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/termux_deploy.sh')
          text = path.read_text()
          old = '  stop_service_confirmed || fail "deployment aborted because canonical service shutdown was not confirmed"\n'
          new = '''  if ! stop_service_confirmed; then
            run rm -rf -- "$release_dir"
            TRANSACTION_ACTIVE=0
            fail "deployment aborted because canonical service shutdown was not confirmed"
          fi
          '''
          if text.count(old) != 1:
              raise SystemExit(f'expected one deployment shutdown site, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          PY
          bash -n scripts/termux_deploy.sh
          bash tests/termux_deploy_test.sh
      - name: Commit repair and remove workflow
        shell: bash
        run: |
          rm -f .github/workflows/repair-stop-failure-cleanup-216.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/termux_deploy.sh .github/workflows/repair-stop-failure-cleanup-216.yml
          git commit -m "fix: remove untouched candidate after stop failure"
          git push origin HEAD:atomic-service-transitions-203
